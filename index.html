}

// ── STATISTIKEN TAB ──
function renderStatistiken(){
  const {races} = state;
  if(!state.statCat) state.statCat='all';
  if(!state.statSection) state.statSection='strecken';
  const cat = state.statCat;
  const section = state.statSection;

  const filtRaces = cat==='all' ? races : races.filter(r=>r.category===cat);
  const sortedRaces = [...filtRaces].sort((a,b)=>a.date.localeCompare(b.date));

  // ── helpers ──
  const fmtLap = s => s||'–';
  const lapToSec = s => {
    if(!s) return null;
    const p=s.split(':');
    if(p.length===2) return parseFloat(p[0])*60+parseFloat(p[1]);
    return parseFloat(s);
  };

  // ── Category filter buttons ──
  const catBtns = div({style:{display:'flex',gap:'6px',flexWrap:'wrap'}},
    ...([['all','⬜ '+t('all'),'#c9d1d9'],...Object.keys(CATEGORIES).filter(c=>races.some(r=>r.category===c)).map(c=>[c,catEmoji(c)+' '+catLabel(c),catColor(c)])]).map(([v,l,c])=>
      btn({class:'btn-outline',style:{color:cat===v?c:'#8b949e',border:`1px solid ${cat===v?c:'#30363d'}`,background:cat===v?c+'18':'transparent',padding:'7px 14px',fontSize:'13px',borderRadius:'8px',fontWeight:'700'},
        onClick:()=>{state.statCat=v;render();} },l)
    )
  );

  // ── Section nav ──
  const sections=[['strecken',t('stat_tracks')],['incidents',t('stat_incidents')],['prognose',t('stat_prognose')],['bestzeiten',t('stat_bestzeiten')],['street',t('stat_street')],['lernkurve',t('stat_lernkurve')],['season','📅 Season']];
  const secNav = div({style:{display:'flex',gap:'0',borderBottom:'1px solid #21262d',background:'#0d1117',borderRadius:'10px 10px 0 0',overflowX:'auto'}},
    ...sections.map(([id,lbl])=>btn({
      style:{flex:'0 0 auto',padding:'11px 8px',background:'none',border:'none',borderBottom:section===id?'2px solid #58a6ff':'2px solid transparent',
        color:section===id?'#58a6ff':'#8b949e',cursor:'pointer',fontFamily:"'Courier New',monospace",fontWeight:'700',fontSize:'12px',transition:'all .15s',whiteSpace:'nowrap'},
      onClick:()=>{state.statSection=id;render();}
    },lbl))
  );

  let sectionContent;

  // ════════════════════════════════
  // 1. STRECKEN-PERFORMANCE
  // ════════════════════════════════
  if(section==='strecken'){
    if(!state.statSort) state.statSort='irSum';
    const ss = state.statSort;
    const normTrack=t=>(t||'').trim()
      .replace(' - Full Course','').replace(' - Grand Prix','')
      .replace(' Raceway','').replace('Summit Point Raceway','Summit Point');
    const normCar=c=>(c||'').trim()
      .replace('Global Mazda MX-5 Cup','MX-5').replace('Global MX-5 Cup','MX-5');
    const trackMap={};
    filtRaces.forEach(r=>{
      const key=normTrack(r.track)+(r.car?'|'+normCar(r.car):'');
      if(!trackMap[key]) trackMap[key]={track:normTrack(r.track),car:normCar(r.car),count:0,posSum:0,best:99,irSum:0,incSum:0,clean:0,laps:[]};
      const t=trackMap[key];
      t.count++;t.posSum+=r.pos;t.best=Math.min(t.best,r.pos);
      t.irSum+=((r.iRatingAfter||0)-(r.iRatingBefore||0));
      t.incSum+=r.inc;
      if(r.inc===0)t.clean++;
      if(r.fastestLap&&!r.wetRace) t.laps.push(r.fastestLap);
    });
    const rows=Object.values(trackMap).sort((a,b)=>{
      if(ss==='irSum') return b.irSum-a.irSum;
      if(ss==='count') return b.count-a.count;
      if(ss==='avgPos') return (a.posSum/a.count)-(b.posSum/b.count);
      if(ss==='avgInc') return (a.incSum/a.count)-(b.incSum/b.count);
      if(ss==='cleanPct') return (b.clean/b.count)-(a.clean/a.count);
      return b.irSum-a.irSum;
    });
    const shortCar=c=>c||'';
    const shortTrack=t=>t||'';
    const cols=[['count',t('races_col')],['avgPos',t('avg_pos_col')],['avgInc',t('avg_inc_col')],['irSum',t('ir_sum_col')],['cleanPct',t('clean_pct_col')]];
    sectionContent = div({style:{display:'flex',flexDirection:'column',gap:'0'}},
      div({style:{display:'flex',gap:'8px',padding:'14px 16px',background:'#161b22',borderRadius:'10px',marginBottom:'12px',flexWrap:'wrap',alignItems:'center'}},
        span({style:{fontSize:'11px',color:'#8b949e',fontWeight:'700',letterSpacing:'1px',marginRight:'4px'}},t('sort_label')),
        ...cols.map(([v,l])=>btn({class:'btn-outline',
          style:{fontSize:'11px',padding:'4px 10px',borderRadius:'6px',color:ss===v?'#58a6ff':'#8b949e',border:'1px solid '+(ss===v?'#58a6ff':'#30363d'),background:ss===v?'#58a6ff18':'transparent'},
          onClick:()=>{state.statSort=v;render();} },l+(ss===v?' ▼':'')))
      ),
      div({style:{overflowX:'auto'}},
        h('table',{style:{width:'100%',borderCollapse:'collapse',fontFamily:"'Courier New',monospace",fontSize:'13px'}},
          h('thead',{},h('tr',{},
            ...[t('track'),t('car'),t('races_col'),t('avg_pos_col'),'Best',t('avg_inc_col'),t('clean_pct_col'),t('ir_sum_col')].map(col=>
              h('th',{style:{textAlign:'left',padding:'10px 12px',color:'#8b949e',fontSize:'11px',letterSpacing:'1px',fontWeight:'700',borderBottom:'1px solid #21262d',textTransform:'uppercase',whiteSpace:'nowrap'}},col)
            )
          )),
          h('tbody',{},
            ...rows.map((t,i)=>{
              const avgP=(t.posSum/t.count).toFixed(1);
              const avgI=(t.incSum/t.count).toFixed(1);
              const cleanPct=Math.round(t.clean/t.count*100);
              const incC=parseFloat(avgI)<=2?'#3fb950':parseFloat(avgI)<=4?'#e3b341':'#f85149';
              const irC=t.irSum>=0?'#3fb950':'#f85149';
              const rowBg=i%2===0?'#0d111700':'#16171a44';
              return h('tr',{style:{borderBottom:'1px solid #21262d44',background:rowBg}},
                h('td',{style:{padding:'10px 12px',color:'#c9d1d9',fontWeight:'700',maxWidth:'220px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},shortTrack(t.track)),
                h('td',{style:{padding:'10px 12px',color:'#8b949e',fontSize:'12px',whiteSpace:'nowrap'}},shortCar(t.car)),
                h('td',{style:{padding:'10px 12px',color:'#c9d1d9',fontWeight:'700'}},t.count),
                h('td',{style:{padding:'10px 12px',color:parseFloat(avgP)<=8?'#3fb950':parseFloat(avgP)<=14?'#e3b341':'#f85149',fontWeight:'700'}},avgP),
                h('td',{style:{padding:'10px 12px',color:'#ffd700',fontWeight:'700'}},'P'+t.best),
                h('td',{style:{padding:'10px 12px',color:incC,fontWeight:'700'}},avgI+'x'),
                h('td',{style:{padding:'10px 12px',color:'#3fb950'}},cleanPct+'%'),
                h('td',{style:{padding:'10px 12px',color:irC,fontWeight:'700',fontFamily:'monospace'}},fmtD(t.irSum))
              );
            })
          )
        )
      )
    );
  }

  // ════════════════════════════════
  // 2. INCIDENT-ANALYSE
  // ════════════════════════════════
  else if(section==='incidents'){
    const formulaR=[...races.filter(r=>r.category==='formula')].sort((a,b)=>a.date.localeCompare(b.date));
    const roadR=[...races.filter(r=>r.category==='road')].sort((a,b)=>a.date.localeCompare(b.date));
    const calcAvgInc=arr=>arr.length?( arr.reduce((s,r)=>s+r.inc,0)/arr.length).toFixed(2):'–';
    const calcClean=arr=>arr.length?Math.round(arr.filter(r=>r.inc===0).length/arr.length*100)+'%':'–';

    // Rolling 5-race average over time for both cats
    const buildRolling=(arr,n=5)=>{
      return arr.map((_,i)=>{
        const slice=arr.slice(Math.max(0,i-n+1),i+1);
        return {x:i+1,avg:parseFloat((slice.reduce((s,r)=>s+r.inc,0)/slice.length).toFixed(2)),date:arr[i].date,inc:arr[i].inc};
      });
    };
    const fRolling=buildRolling(formulaR);
    const rRolling=buildRolling(roadR);

    // Incidents per range bucket
    const incBuckets=(arr)=>{
      const b={};
      arr.forEach(r=>{const k=Math.min(r.inc,8);b[k]=(b[k]||0)+1;});
      return Array.from({length:9},(_,i)=>({pos:i===8?'8+':i,count:b[i]||0}));
    };
    const fBuckets=incBuckets(formulaR);
    const rBuckets=incBuckets(roadR);

    // Monthly trend
    const monthlyInc=(arr)=>{
      const m={};
      arr.forEach(r=>{const mo=r.date.slice(0,7);if(!m[mo]){m[mo]={sum:0,count:0};}m[mo].sum+=r.inc;m[mo].count++;});
      return Object.keys(m).sort().map(k=>({month:k.slice(5),avg:(m[k].sum/m[k].count).toFixed(2),count:m[k].count}));
    };
    const allMonthly=monthlyInc(sortedRaces);

    const miniBar=(buckets,color)=>{
      const max=Math.max(...buckets.map(b=>b.count))||1;
      return div({style:{display:'flex',gap:'4px',alignItems:'flex-end',height:'60px',marginTop:'8px'}},
        ...buckets.map(b=>{
          const pct=b.count/max;
          const c=b.pos===0?'#3fb950':parseInt(b.pos)<=2?'#e3b341':'#f85149';
          return div({style:{flex:'1',display:'flex',flexDirection:'column',alignItems:'center',gap:'2px'}},
            div({style:{width:'100%',background:c+'44',borderRadius:'2px 2px 0 0',height:Math.max(2,pct*48)+'px',border:'1px solid '+c+'66'}}),
            b.count>0?div({style:{fontSize:'9px',color:c,fontFamily:'monospace'}},b.count):div({style:{height:'12px'}}),
            div({style:{fontSize:'9px',color:'#8b949e',fontFamily:'monospace'}},b.pos+'x')
          );
        })
      );
    };

    sectionContent = div({style:{display:'flex',flexDirection:'column',gap:'12px'}},
      // Summary compare
      div({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}},
        div({class:'card',style:{borderColor:'#58a6ff44'}},
          div({style:{fontSize:'12px',color:'#58a6ff',fontWeight:'700',letterSpacing:'1px',marginBottom:'10px'}},'🔵 FORMULA — '+formulaR.length+' '+t('races')),
          div({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}},
            ...[['Ø Incidents',calcAvgInc(formulaR)],['0x Sauber',calcClean(formulaR)]].map(([l,v])=>
              div({style:{background:'#161b22',borderRadius:'8px',padding:'8px 10px'}},
                div({style:{fontSize:'10px',color:'#8b949e',marginBottom:'3px',letterSpacing:'1px',fontWeight:'700'}},l),
                div({style:{fontSize:'18px',fontWeight:'900',color:'#58a6ff',fontFamily:'monospace'}},v)
              )
            )
          ),
          miniBar(fBuckets,'#58a6ff')
        ),
        div({class:'card',style:{borderColor:'#3fb95044'}},
          div({style:{fontSize:'12px',color:'#3fb950',fontWeight:'700',letterSpacing:'1px',marginBottom:'10px'}},'🟢 ROAD — '+roadR.length+' '+t('races')),
          div({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}},
            ...[['Ø Incidents',calcAvgInc(roadR)],['0x Sauber',calcClean(roadR)]].map(([l,v])=>
              div({style:{background:'#161b22',borderRadius:'8px',padding:'8px 10px'}},
                div({style:{fontSize:'10px',color:'#8b949e',marginBottom:'3px',letterSpacing:'1px',fontWeight:'700'}},l),
                div({style:{fontSize:'18px',fontWeight:'900',color:'#3fb950',fontFamily:'monospace'}},v)
              )
            )
          ),
          miniBar(rBuckets,'#3fb950')
        )
      ),
      // Rolling avg charts
      formulaR.length>3?div({class:'card'},
        div({style:{fontSize:'14px',fontWeight:'700',color:'#c9d1d9',marginBottom:'4px'}},'🔵 Formula — Incidents Trend (Ø5)'),
        svgLine(fRolling,'avg','#58a6ff',600,120)
      ):null,
      roadR.length>3?div({class:'card'},
        div({style:{fontSize:'14px',fontWeight:'700',color:'#c9d1d9',marginBottom:'4px'}},'🟢 Road — Incidents Trend (Ø5)'),
        svgLine(rRolling,'avg','#3fb950',600,120)
      ):null,
      // Monthly table
      allMonthly.length>1?div({class:'card'},
        div({style:{fontSize:'14px',fontWeight:'700',color:'#c9d1d9',marginBottom:'12px'}},'📅 Monatlicher Ø Incidents'),
        div({style:{overflowX:'auto'}},
          h('table',{style:{width:'100%',borderCollapse:'collapse',fontFamily:"'Courier New',monospace",fontSize:'13px'}},
            h('thead',{},h('tr',{},
              ...['Monat',t('races'),'Ø Incidents','Bewertung'].map(col=>
                h('th',{style:{textAlign:'left',padding:'8px 12px',color:'#8b949e',fontSize:'11px',letterSpacing:'1px',fontWeight:'700',borderBottom:'1px solid #21262d',textTransform:'uppercase'}},col)
              )
            )),
            h('tbody',{},
              ...allMonthly.map(m=>{
                const avg=parseFloat(m.avg);
                const c=avg<=2?'#3fb950':avg<=4?'#e3b341':'#f85149';
                const label=avg<=2?t('clean'):avg<=4?'~ Mittel':'✗ '+t('stat_incidents');
                return h('tr',{style:{borderBottom:'1px solid #21262d44'}},
                  h('td',{style:{padding:'9px 12px',color:'#c9d1d9',fontWeight:'700'}},m.month),
                  h('td',{style:{padding:'9px 12px',color:'#c9d1d9'}},m.count),
                  h('td',{style:{padding:'9px 12px',color:c,fontWeight:'700',fontFamily:'monospace'}},m.avg+'x'),
                  h('td',{style:{padding:'9px 12px',color:c,fontSize:'12px'}},label)
                );
              })
            )
          )
        )
      ):null
    );
  }

  // ════════════════════════════════
  // 3. iRATING-PROGNOSE
  // ════════════════════════════════
  else if(section==='prognose'){
    if(state.trendWindow===undefined) state.trendWindow=10;
    const buildPrognose=(arr,color,label)=>{
      if(arr.length<3) return div({class:'card',style:{textAlign:'center',color:'#8b949e',padding:'30px'}},t('not_enough_data')+label);
      const curIR=arr[arr.length-1].iRatingAfter;

      // Trend window: last N or all races for regression
      const totalN=arr.length;
      const ys=arr.map(r=>r.iRatingAfter);
      const tw=state.trendWindow==='all'?totalN:Math.min(state.trendWindow,totalN);
      const trendArr=arr.slice(-tw);
      const tOffset=totalN-tw;
      const n=trendArr.length;
      const tys=trendArr.map(r=>r.iRatingAfter);
      const sumX=tys.map((_,i)=>i).reduce((a,b)=>a+b,0);
      const sumY=tys.reduce((a,b)=>a+b,0);
      const sumXY=tys.reduce((s,y,i)=>s+i*y,0);
      const sumX2=tys.map((_,i)=>i*i).reduce((a,b)=>a+b,0);
      const slope=(n*sumXY-sumX*sumY)/(n*sumX2-sumX*sumX);
      const intercept=(sumY-slope*sumX)/n;
      const trendAt=gi=>Math.round(intercept+slope*(gi-tOffset));

      // Rolling 5-average
      const rolling=arr.map((_,i)=>{
        const slice=arr.slice(Math.max(0,i-4),i+1);
        return {x:i+1,iR:arr[i].iRatingAfter,trend:trendAt(i),avg5:Math.round(slice.reduce((s,r)=>s+r.iRatingAfter,0)/slice.length),date:arr[i].date};
      });

      // Milestones
      const milestones=[1000,1200,1400,1600,1800,2000,2200,2500,3000,4000].filter(m=>m>curIR).slice(0,3);
      const racesPerPoint = slope>0 ? slope : 0;
      const milestonesDiv = milestones.length>0&&slope>0 ? div({style:{display:'flex',gap:'8px',flexWrap:'wrap',marginTop:'8px'}},
        ...milestones.map(m=>{
          const racesNeeded=Math.round((m-curIR)/slope);
          return div({style:{background:'#161b22',borderRadius:'8px',padding:'8px 14px',display:'flex',flexDirection:'column',gap:'2px'}},
            div({style:{fontSize:'11px',color:'#8b949e',letterSpacing:'1px',fontWeight:'700'}},'🎯 '+m+' iR'),
            div({style:{fontSize:'15px',fontWeight:'900',color:color,fontFamily:'monospace'}},'~'+racesNeeded+' '+t('races')),
            div({style:{fontSize:'11px',color:'#8b949e'}},t('at_avg')+' +'+slope.toFixed(1)+' iR/'+(t('race')))
          );
        })
      ) : div({style:{fontSize:'12px',color:'#f85149',marginTop:'8px'}},slope<=0?t('neg_trend'):'');

      // Build extended projection line (20 races ahead)
      const projCount=Math.min(20,totalN);
      const projData=[...rolling];
      for(let i=0;i<projCount;i++){
        projData.push({x:totalN+i+1,iR:null,trend:trendAt(totalN+i),avg5:null,date:null});
      }

      return div({class:'card',style:{borderColor:color+'44'}},
        div({style:{fontSize:'14px',fontWeight:'700',color:'#c9d1d9',marginBottom:'4px'}},(color==='#58a6ff'?'🔵 Formula':'🟢 Road')+' '+t('irating_prognose')),
        div({style:{display:'flex',gap:'16px',flexWrap:'wrap',marginBottom:'12px'}},
          div({},div({style:{fontSize:'11px',color:'#8b949e'}},t('ir_current')),div({class:'mono',style:{fontSize:'22px',color}},(curIR||'–').toString())),
          div({},div({style:{fontSize:'11px',color:'#8b949e'}},t('ir_trend')),div({class:'mono',style:{fontSize:'22px',color:slope>=0?'#3fb950':'#f85149'}},(slope>=0?'+':'')+slope.toFixed(1))),
          div({},div({style:{fontSize:'11px',color:'#8b949e'}},t('last10_avg')),div({class:'mono',style:{fontSize:'22px',color:color}},Math.round(ys.slice(-10).reduce((a,b)=>a+b,0)/Math.min(10,ys.length)).toString()))
        ),
        // iR chart with trend line overlay
        (()=>{
          const wrapper=div({style:{position:'relative'}});
          // SVG chart of actual iR
          const w=600, ht=160;
          const irVals=rolling.map(d=>d.iR);
          const trendVals=projData.map(d=>d.trend);
          const allVals=[...irVals,...trendVals].filter(v=>v!=null);
          const minV=Math.min(...allVals), maxV=Math.max(...allVals);
          const range=maxV-minV||1;
          const totalPts=projData.length;
          const px=i=>(i/(totalPts-1))*w;
          const py=v=>ht-((v-minV)/range)*(ht-10)-2;
          const svgEl=document.createElementNS('http://www.w3.org/2000/svg','svg');
          svgEl.setAttribute('width','100%');svgEl.setAttribute('height',ht+20);
          svgEl.setAttribute('viewBox','0 0 '+w+' '+(ht+20));svgEl.style.display='block';
          // Defs gradient
          const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
          const grad=document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
          grad.setAttribute('id','pgrad'+color.slice(1));grad.setAttribute('x1','0');grad.setAttribute('y1','0');grad.setAttribute('x2','0');grad.setAttribute('y2','1');
          const s1=document.createElementNS('http://www.w3.org/2000/svg','stop');s1.setAttribute('offset','0%');s1.setAttribute('stop-color',color);s1.setAttribute('stop-opacity','0.3');
          const s2=document.createElementNS('http://www.w3.org/2000/svg','stop');s2.setAttribute('offset','100%');s2.setAttribute('stop-color',color);s2.setAttribute('stop-opacity','0');
          grad.appendChild(s1);grad.appendChild(s2);defs.appendChild(grad);svgEl.appendChild(defs);
          // Area fill for actual iR
          const areaPoints=rolling.map((d,i)=>px(i)+','+py(d.iR)).join(' ');
          const area=document.createElementNS('http://www.w3.org/2000/svg','polygon');
          area.setAttribute('points',px(0)+','+ht+' '+areaPoints+' '+px(rolling.length-1)+','+ht);
          area.setAttribute('fill','url(#pgrad'+color.slice(1)+')');svgEl.appendChild(area);
          // Actual iR line
          const actualLine=document.createElementNS('http://www.w3.org/2000/svg','polyline');
          actualLine.setAttribute('points',rolling.map((d,i)=>px(i)+','+py(d.iR)).join(' '));
          actualLine.setAttribute('fill','none');actualLine.setAttribute('stroke',color);actualLine.setAttribute('stroke-width','2.5');
          svgEl.appendChild(actualLine);
          // Trend line (full range, dashed for projection part)
          const trendPoints=projData.map((d,i)=>px(i)+','+py(d.trend)).join(' ');
          const trendLine=document.createElementNS('http://www.w3.org/2000/svg','polyline');
          trendLine.setAttribute('points',trendPoints);trendLine.setAttribute('fill','none');
          trendLine.setAttribute('stroke','#e3b341');trendLine.setAttribute('stroke-width','1.5');trendLine.setAttribute('stroke-dasharray','5 3');
          svgEl.appendChild(trendLine);
          // Divider line between actual and projection
          const divX=px(rolling.length-1);
          const divLine=document.createElementNS('http://www.w3.org/2000/svg','line');
          divLine.setAttribute('x1',divX);divLine.setAttribute('x2',divX);
          divLine.setAttribute('y1',0);divLine.setAttribute('y2',ht);
          divLine.setAttribute('stroke','#30363d');divLine.setAttribute('stroke-dasharray','3 3');
          svgEl.appendChild(divLine);
          const projLabel=document.createElementNS('http://www.w3.org/2000/svg','text');
          projLabel.setAttribute('x',parseFloat(divX)+4);projLabel.setAttribute('y',14);
          projLabel.setAttribute('fill','#8b949e');projLabel.setAttribute('font-size','10');
          projLabel.textContent=t('forecast_label');svgEl.appendChild(projLabel);
          wrapper.appendChild(svgEl);
          return wrapper;
        })(),
        // Legend
        div({style:{display:'flex',gap:'16px',marginTop:'6px',fontSize:'11px',color:'#8b949e'}},
          span({},span({style:{color}},'── '), t('actual_ir')),
          span({},span({style:{color:'#e3b341'}},'- - '), t('trendline'))
        ),
        milestonesDiv
      );
    };

    const fRaces=[...races.filter(r=>r.category==='formula')].sort((a,b)=>a.date.localeCompare(b.date));
    const rRaces=[...races.filter(r=>r.category==='road')].sort((a,b)=>a.date.localeCompare(b.date));

    const twOptions=[['5',t('last_n')+'5'],['10',t('last_n')+'10'],['20',t('last_n')+'20'],['all',t('all_compact')]];
    const trendSelector=div({style:{display:'flex',gap:'6px',alignItems:'center',flexWrap:'wrap',padding:'10px 14px',background:'#161b22',borderRadius:'10px'}},
      span({style:{fontSize:'11px',color:'#8b949e',fontWeight:'700',letterSpacing:'1px',marginRight:'4px'}},t('trend_window')),
      ...twOptions.map(([v,l])=>btn({class:'btn-outline',
        style:{fontSize:'11px',padding:'4px 10px',borderRadius:'6px',
          color:String(state.trendWindow)===v?'#e3b341':'#8b949e',
          border:'1px solid '+(String(state.trendWindow)===v?'#e3b341':'#30363d'),
          background:String(state.trendWindow)===v?'#e3b34118':'transparent'},
        onClick:()=>{state.trendWindow=v==='all'?'all':parseInt(v);render();}
      },l+(String(state.trendWindow)===v?' ✓':'')))
    );

    sectionContent = div({style:{display:'flex',flexDirection:'column',gap:'12px'}},
      trendSelector,
      (cat==='all'||cat==='formula') ? buildPrognose(fRaces,'#58a6ff','Formula') : null,
      (cat==='all'||cat==='road') ? buildPrognose(rRaces,'#3fb950','Road') : null
    );
  }

  // ════════════════════════════════
  // 4. RENNBESTZEITEN
  // ════════════════════════════════
  else if(section==='bestzeiten'){
    const bzShowWet = state.bzShowWet||false;
    const bzRaces = bzShowWet ? filtRaces : filtRaces.filter(r=>!r.wetRace);
    const normBzCar=c=>(c||'').trim().replace('Global Mazda MX-5 Cup','MX-5').replace('Global MX-5 Cup','MX-5').replace('FIA Formula 4','FIA F4');
    const shortCar=c=>normBzCar(c||'');
    const catColor=car=>normBzCar(car).includes('F4')?'#58a6ff':'#3fb950';

    // Group by track → car
    const trackMap={};
    bzRaces.filter(r=>r.fastestLap).forEach(r=>{
      const tr=r.track;
      const car=normBzCar(r.car);
      if(!trackMap[tr]) trackMap[tr]={track:tr,cars:{}};
      if(!trackMap[tr].cars[car]) trackMap[tr].cars[car]={car:r.car,allLaps:[]};
      trackMap[tr].cars[car].allLaps.push({lap:r.fastestLap,date:r.date,pos:r.pos,ir:r.iRatingAfter,wetRace:r.wetRace});
    });

    // Sort laps within each car, compute best
    Object.values(trackMap).forEach(tk=>{
      Object.values(tk.cars).forEach(c=>{
        c.allLaps.sort((a,b)=>(lapToSec(a.lap)||999)-(lapToSec(b.lap)||999));
        c.best=c.allLaps[0];
      });
      // track best = best across all cars
      const allBests=Object.values(tk.cars).map(c=>lapToSec(c.best.lap)).filter(Boolean);
      tk.bestSec=allBests.length?Math.min(...allBests):null;
      tk.carCount=Object.keys(tk.cars).length;
    });

    // Sort tracks alphabetically
    const trackRows=Object.values(trackMap).sort((a,b)=>a.track.localeCompare(b.track));

    if(!state.bzTrackExp) state.bzTrackExp={};
    if(!state.bzCarExp)   state.bzCarExp={};

    sectionContent = div({style:{display:'flex',flexDirection:'column',gap:'6px'}},
      div({style:{display:'flex',justifyContent:'flex-end',marginBottom:'4px'}},
        btn({class:'btn-outline',style:{fontSize:'12px',padding:'5px 12px',borderRadius:'8px',color:bzShowWet?'#58a6ff':'#8b949e',border:`1px solid ${bzShowWet?'#58a6ff':'#30363d'}`,background:bzShowWet?'#58a6ff11':'transparent'},
          onClick:()=>setState({bzShowWet:!bzShowWet})},t('wet_toggle_label')+' '+(bzShowWet?t('wet_hide'):t('wet_show')))
      ),
      ...trackRows.map(tk=>{
        const tExp=state.bzTrackExp[tk.track];
        const bestCarEntry=Object.values(tk.cars).find(c=>lapToSec(c.best.lap)===tk.bestSec);
        const bestLapStr=bestCarEntry?bestCarEntry.best.lap:null;

        // ── Car rows (rendered when track expanded) ──
        const carRows=Object.values(tk.cars)
          .sort((a,b)=>(lapToSec(a.best.lap)||999)-(lapToSec(b.best.lap)||999))
          .map(c=>{
            const cKey=tk.track+'|'+normBzCar(c.car);
            const cExp=state.bzCarExp[cKey];
            const cc=catColor(c.car);
            const secBest=lapToSec(c.best.lap);
            const secWorst=lapToSec(c.allLaps[c.allLaps.length-1].lap);
            const delta=secBest&&secWorst&&c.allLaps.length>1?((secWorst-secBest)).toFixed(3):null;

            return div({style:{background:'#0d1117',borderRadius:'8px',overflow:'hidden',marginBottom:'4px'}},
              // Car header row
              div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',cursor:'pointer'},
                onClick:()=>{state.bzCarExp[cKey]=!cExp;render();}},
                div({style:{display:'flex',alignItems:'center',gap:'10px'}},
                  div({style:{fontSize:'11px',color:cc,background:cc+'18',border:`1px solid ${cc}33`,padding:'2px 8px',borderRadius:'4px',fontWeight:'700'}},'🚗 '+shortCar(c.car)),
                  div({style:{fontFamily:'monospace',fontWeight:'700',color:'#e3b341',fontSize:'14px'}},c.best.lap),
                  delta?div({style:{fontSize:'11px',color:'#8b949e'}},'Δ '+delta+'s'):null
                ),
                div({style:{display:'flex',alignItems:'center',gap:'10px'}},
                  div({style:{fontSize:'11px',color:'#8b949e'}},c.allLaps.length+' '+(state.lang==='es'?'vuelta'+(c.allLaps.length!==1?'s':''):'lap'+(c.allLaps.length!==1?'s':''))),
                  div({style:{color:'#484f58',fontSize:'12px',transition:'transform .15s',transform:cExp?'rotate(180deg)':'rotate(0)'}},'▼')
                )
              ),
              // Individual laps (when car expanded)
              cExp?div({style:{borderTop:'1px solid #21262d',padding:'8px 14px',display:'flex',flexDirection:'column',gap:'3px'}},
                ...c.allLaps.map((l,i)=>{
                  const isB=i===0;
                  const sec=lapToSec(l.lap);
                  const diffSec=sec&&secBest&&!isB?((sec-secBest)).toFixed(3):null;
                  return div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 8px',background:isB?'#e3b34112':'transparent',borderRadius:'6px',fontSize:'12px'}},
                    div({style:{display:'flex',gap:'8px',alignItems:'center'}},
                      div({style:{width:'16px',height:'16px',borderRadius:'50%',background:isB?'#e3b341':'#21262d',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'9px',fontWeight:'700',color:isB?'#000':'#8b949e',flexShrink:'0'}},i+1),
                      div({style:{fontFamily:'monospace',fontWeight:'700',color:isB?'#e3b341':'#c9d1d9',fontSize:'13px'}},l.lap),
                      diffSec?div({style:{color:'#f85149',fontFamily:'monospace',fontSize:'11px'}},'+'+diffSec+'s'):null
                    ),
                    div({style:{display:'flex',gap:'10px',color:'#8b949e',fontSize:'11px'}},
                      span({},'P'+l.pos),
                      span({},l.date.slice(0,10))
                    )
                  );
                })
              ):null
            );
          });

        return div({class:'card',style:{padding:'0',overflow:'hidden'}},
          // ── Track header row ──
          div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',cursor:'pointer'},
            onClick:()=>{state.bzTrackExp[tk.track]=!tExp;render();}},
            div({style:{display:'flex',flexDirection:'column',gap:'3px'}},
              div({style:{fontSize:'14px',fontWeight:'700',color:'#c9d1d9'}},'🏁 '+tk.track),
              div({style:{display:'flex',gap:'12px',fontSize:'12px',color:'#8b949e',flexWrap:'wrap',marginTop:'2px'}},
                bestLapStr?span({},span({style:{color:'#e3b341',fontWeight:'700',fontFamily:'monospace'}},bestLapStr),state.lang==='es'?' Mejor vuelta':' Best lap'):null,
                span({},tk.carCount+' '+(state.lang==='es'?'auto'+(tk.carCount!==1?'s':''):'car'+(tk.carCount!==1?'s':'')))
              )
            ),
            div({style:{color:'#484f58',fontSize:'14px',transition:'transform .15s',transform:tExp?'rotate(180deg)':'rotate(0)'}},'▼')
          ),
          // ── Car list (when track expanded) ──
          tExp?div({style:{borderTop:'1px solid #21262d',padding:'10px 12px'}},
            ...carRows
          ):null
        );
      }),
      trackRows.length===0?div({class:'card',style:{textAlign:'center',color:'#8b949e',padding:'40px'}},t('no_bestzeiten')):null
    );
  }


  // ════════════════════════════════
  // 5. STREET vs. PERMANENT TRACK
  // ════════════════════════════════
  else if(section==='street'){
    const STREET_CIRCUITS=[
      'Adelaide Street Circuit',
      'Long Beach Street Circuit',
      'Detroit Grand Prix at Belle Isle',
      'Circuit Gilles Villeneuve',
      'Miami International Autodrome',
      'Circuit des 24 Heures du Mans',
      'Mount Panorama Circuit',
      'St. Petersburg'
    ];
    const isStreet=track=>STREET_CIRCUITS.some(sc=>track&&track.toLowerCase().includes(sc.toLowerCase().split(' ').slice(0,3).join(' ')));

    const streetR=filtRaces.filter(r=>isStreet(r.track));
    const permR=filtRaces.filter(r=>!isStreet(r.track));

    const calcStats=arr=>{
      if(!arr.length) return null;
      const count=arr.length;
      const avgPos=(arr.reduce((s,r)=>s+r.pos,0)/count).toFixed(1);
      const avgInc=(arr.reduce((s,r)=>s+r.inc,0)/count).toFixed(2);
      const irSum=arr.reduce((s,r)=>s+((r.iRatingAfter||0)-(r.iRatingBefore||0)),0);
      const avgIR=(irSum/count).toFixed(1);
      const cleanPct=Math.round(arr.filter(r=>r.inc===0).length/count*100);
      const best=Math.min(...arr.map(r=>r.pos));
      const wins=arr.filter(r=>r.pos===1).length;
      return {count,avgPos,avgInc,irSum,avgIR,cleanPct,best,wins};
    };

    const sS=calcStats(streetR);
    const pS=calcStats(permR);

    const statCard=(label,color,emoji,stats,trackList)=>{
      if(!stats) return div({class:'card',style:{borderColor:color+'44',textAlign:'center',color:'#8b949e',padding:'30px'}},
        t('no_races_selection')
      );
      const irC=parseFloat(stats.avgIR)>=0?'#3fb950':'#f85149';
      const incC=parseFloat(stats.avgInc)<=2?'#3fb950':parseFloat(stats.avgInc)<=4?'#e3b341':'#f85149';
      return div({class:'card',style:{borderColor:color+'44'}},
        div({style:{fontSize:'13px',color,fontWeight:'700',letterSpacing:'1px',marginBottom:'12px'}},emoji+' '+label+' — '+stats.count+' '+t('races')),
        div({style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px',marginBottom:'12px'}},
          ...[
            ['Ø Finish','#c9d1d9',stats.avgPos],
            ['Ø Incidents',incC,stats.avgInc+'x'],
            [t('avg_ir_per_race'),irC,(parseFloat(stats.avgIR)>=0?'+':'')+stats.avgIR],
            ['Sauber',  '#3fb950',stats.cleanPct+'%'],
            ['Best Result','#ffd700','P'+stats.best],
            [t('wins'),'#e3b341',stats.wins+'x 🏆'],
          ].map(([l,c,v])=>div({style:{background:'#161b22',borderRadius:'8px',padding:'8px 10px'}},
            div({style:{fontSize:'10px',color:'#8b949e',marginBottom:'3px',letterSpacing:'1px',fontWeight:'700'}},l),
            div({style:{fontSize:'18px',fontWeight:'900',color:c,fontFamily:'monospace'}},v)
          ))
        ),
        trackList&&trackList.length>0?(()=>{
          const tCount={};
          trackList.forEach(t=>{tCount[t]=(tCount[t]||0)+1;});
          const tracks=Object.entries(tCount).sort((a,b)=>b[1]-a[1]);
          const maxC=tracks[0][1]||1;
          const shortT=t=>t
            .replace(' Street Circuit','').replace(' Grand Prix at Belle Isle','')
            .replace('Circuit des 24 Heures du Mans','Le Mans')
            .replace('Circuit Gilles Villeneuve','Gilles Villeneuve')
            .replace('Miami International Autodrome','Miami')
            .replace('WeatherTech Raceway at Laguna Seca','Laguna Seca')
            .replace(' International Raceway','').replace(' International Speedway','')
            .replace(' Motorsports Park','').replace(' Motor Speedway','')
            .replace(' Racing Circuit','').replace(' Circuit','')
            .replace(' Raceway','').replace(' Speedway','');
          return div({style:{borderTop:'1px solid #21262d',paddingTop:'12px',marginTop:'4px'}},
            div({style:{fontSize:'10px',color:'#8b949e',fontWeight:'700',letterSpacing:'1px',marginBottom:'10px'}},t('raced_tracks')),
            div({style:{display:'flex',flexWrap:'wrap',gap:'8px 12px',alignItems:'center',lineHeight:'1.6',padding:'4px 0'}},
              ...tracks.flatMap(([t,c],i)=>{
                const sep=i>0?[span({style:{color:'#30363d',fontSize:'14px',userSelect:'none'}},'·')]:[];
                return [...sep,(()=>{
                const ratio=c/maxC;
                const fs=Math.round(10+ratio*14);
                const op=0.5+ratio*0.5;
                const fw=ratio>0.5?'900':'700';
                  return span({
                    title:t+' ('+c+' '+state.lang==='es'?'carreras':'races'+')',
                    style:{fontSize:fs+'px',fontWeight:fw,color:color,opacity:op,cursor:'default',fontFamily:"'Courier New',monospace"}
                  },shortT(t)+(c>1?' ×'+c:''));
                })()];
              })
            )
          );
        })():null
      );
    };

    const deltaRow=(label,sVal,pVal,higherIsBetter=true)=>{
      const s=parseFloat(sVal), p=parseFloat(pVal);
      if(isNaN(s)||isNaN(p)) return null;
      const diff=(s-p).toFixed(2);
      const streetBetter=higherIsBetter?s>p:s<p;
      const streetWorse=higherIsBetter?s<p:s>p;
      const c=streetBetter?'#3fb950':streetWorse?'#f85149':'#8b949e';
      const icon=streetBetter?'▲':streetWorse?'▼':'–';
      return h('tr',{style:{borderBottom:'1px solid #21262d44'}},
        h('td',{style:{padding:'8px 12px',color:'#8b949e',fontSize:'12px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'0.5px'}},label),
        h('td',{style:{padding:'8px 12px',color:'#e06c75',fontWeight:'700',fontFamily:'monospace',textAlign:'center'}},sVal),
        h('td',{style:{padding:'8px 12px',color:'#61afef',fontWeight:'700',fontFamily:'monospace',textAlign:'center'}},pVal),
        h('td',{style:{padding:'8px 12px',color:c,fontWeight:'700',fontFamily:'monospace',textAlign:'center'}},icon+' '+(diff>0?'+':'')+diff)
      );
    };

    const streetTracks=[...new Set(streetR.map(r=>r.track))];
    const permCount=[...new Set(permR.map(r=>r.track))].length;

    sectionContent = div({style:{display:'flex',flexDirection:'column',gap:'12px'}},
      div({style:{background:'#161b22',borderRadius:'8px',padding:'10px 14px',fontSize:'12px',color:'#8b949e',display:'flex',gap:'16px',flexWrap:'wrap'}},
        span({},span({style:{color:'#e06c75',fontWeight:'700'}},'🏙️ Street Circuits: '),streetR.length+' '+(state.lang==='es'?'carreras en':'races on')+' '+streetTracks.length+' '+(state.lang==='es'?'pistas':'tracks')),
        span({},span({style:{color:'#61afef',fontWeight:'700'}},'🏁 Permanent Tracks: '),permR.length+' '+(state.lang==='es'?'carreras en':'races on')+' '+permCount+' '+(state.lang==='es'?'pistas':'tracks'))
      ),
      (sS&&pS)?div({class:'card'},
        div({style:{fontSize:'13px',color:'#c9d1d9',fontWeight:'700',marginBottom:'12px',letterSpacing:'1px'}},t('direct_compare')),
        div({style:{overflowX:'auto'}},
          h('table',{style:{width:'100%',borderCollapse:'collapse',fontFamily:"'Courier New',monospace",fontSize:'13px'}},
            h('thead',{},h('tr',{},
              ...['Metrik',
                  span({style:{color:'#e06c75'}},t('stat_street')),
                  span({style:{color:'#61afef'}},'🏁 Permanent'),
                  'Δ Street'
              ].map(col=>h('th',{style:{textAlign:'center',padding:'8px 12px',color:'#8b949e',fontSize:'11px',letterSpacing:'1px',fontWeight:'700',borderBottom:'1px solid #21262d',textTransform:'uppercase'}},col))
            )),
            h('tbody',{},
              deltaRow('Ø Finish Pos', sS.avgPos, pS.avgPos, false),
              deltaRow('Ø Incidents',  sS.avgInc,  pS.avgInc,  false),
              deltaRow(t('avg_ir_per_race'),  sS.avgIR,   pS.avgIR,   true),
              deltaRow('Sauber %',     sS.cleanPct.toString(), pS.cleanPct.toString(), true)
            )
          )
        ),
        div({style:{marginTop:'10px',fontSize:'11px',color:'#8b949e'}},t('street_better'))
      ):null,
      div({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}},
        statCard('Street Circuits','#e06c75','🏙️',sS,streetR.map(r=>r.track)),
        statCard('Permanent Tracks','#61afef','🏁',pS,[...permR.map(r=>r.track)])
      )
    );

  // ════════════════════════════════
  // 6. STRECKENLERNKURVE
  // ════════════════════════════════
  else if(section==='lernkurve'){
    const lcNormCar=c=>(c||'').trim().replace('Global Mazda MX-5 Cup','MX-5').replace('Global MX-5 Cup','MX-5').replace('FIA Formula 4','FIA F4');
    const lcToSec=s=>{if(!s)return null;const p=s.split(':');if(p.length===2)return parseFloat(p[0])*60+parseFloat(p[1]);return parseFloat(s)||null;};
    const getWeek=d=>{const dt=new Date(d);const jan=new Date(dt.getFullYear(),0,1);return Math.ceil(((dt-jan)/864e5+jan.getDay()+1)/7);};
    const getYearWeek=d=>{const dt=new Date(d);return dt.getFullYear()*100+getWeek(d);};

    const lcMap={};
    filtRaces.filter(r=>!r.wetRace).forEach(r=>{
      const key=r.track+'|'+lcNormCar(r.car);
      if(!lcMap[key]) lcMap[key]={track:r.track,car:lcNormCar(r.car),races:[]};
      lcMap[key].races.push(r);
    });

    // Group each track's races into calendar weeks → one data point per week
    const lcTracks=Object.values(lcMap).map(tk=>{
      const byWeek={};
      tk.races.forEach(r=>{
        const wk=getYearWeek(r.date);
        if(!byWeek[wk]) byWeek[wk]={week:wk,races:[],label:r.date.slice(0,10)};
        byWeek[wk].races.push(r);
      });
      const weeks=Object.values(byWeek).sort((a,b)=>a.week-b.week).map(w=>{
        const lapSecs=w.races.map(r=>lcToSec(r.fastestLap)).filter(Boolean);
        const bestLap=lapSecs.length?Math.min(...lapSecs):null;
        const bestLapStr=lapSecs.length?w.races.filter(r=>lcToSec(r.fastestLap)===bestLap)[0]?.fastestLap:null;
        const bestPos=Math.min(...w.races.map(r=>r.pos));
        const avgSof=w.races.reduce((s,r)=>s+(r.sof||0),0)/w.races.length;
        return {label:w.label,count:w.races.length,bestLap,bestLapStr,bestPos,avgSof:Math.round(avgSof)};
      });
      return {...tk,weeks};
    }).filter(t=>t.weeks.reduce((s,w)=>s+w.count,0)>=2).sort((a,b)=>b.weeks.length===a.weeks.length?b.weeks.reduce((s,w)=>s+w.count,0)-a.weeks.reduce((s,w)=>s+w.count,0):b.weeks.length-a.weeks.length);

    const singleWeekTracks=lcTracks.filter(t=>t.weeks.length<2);
    const multiWeekTracks=lcTracks.filter(t=>t.weeks.length>=2);

    if(!lcTracks.length){
      sectionContent=div({class:'card',style:{textAlign:'center',color:'#8b949e',padding:'40px'}},t('min_2_races'));
    } else {
      sectionContent=div({style:{display:'flex',flexDirection:'column',gap:'12px'}},
        ...multiWeekTracks.map(tk=>{
          const w=tk.weeks;
          const lapWeeks=w.filter(x=>x.bestLap);
          const hasLaps=lapWeeks.length>=2;

          // ── Trend classification ──
          let trendColor='#8b949e', trendLabel='', summaryLine='';
          if(w.length<2){
            trendLabel=t('one_week_only');
            summaryLine=t('come_back');
          } else if(hasLaps){
            const first=lapWeeks[0].bestLap, last=lapWeeks[lapWeeks.length-1].bestLap, best=Math.min(...lapWeeks.map(x=>x.bestLap));
            const imp=first-last;
            const pct=(imp/first*100);
            // regression
            const n=lapWeeks.length,xs=lapWeeks.map((_,i)=>i),ys=lapWeeks.map(x=>x.bestLap);
            const sx=xs.reduce((a,b)=>a+b,0),sy=ys.reduce((a,b)=>a+b,0);
            const sxy=xs.reduce((s,x,i)=>s+x*ys[i],0),sx2=xs.reduce((s,x)=>s+x*x,0);
            const slope=n>1?(n*sxy-sx*sy)/(n*sx2-sx*sx):0;
            if(slope<-0.3){trendColor='#3fb950';trendLabel=t('learning_active');}
            else if(slope<0.1){trendColor='#e3b341';trendLabel=t('plateau');}
            else{trendColor='#f85149';trendLabel=t('regression');}
            summaryLine=state.lang==='es'?(imp>0?'Mejor vuelta mejoró de '+lapWeeks[0].bestLapStr+' a '+lapWeeks[lapWeeks.length-1].bestLapStr+' ('+Math.abs(imp).toFixed(3)+'s más rápido)':'Mejor vuelta de '+lapWeeks[0].bestLapStr+' a '+lapWeeks[lapWeeks.length-1].bestLapStr+' (+'+Math.abs(imp).toFixed(3)+'s más lento)'):(imp>0?'Best lap improved from '+lapWeeks[0].bestLapStr+' to '+lapWeeks[lapWeeks.length-1].bestLapStr+' ('+Math.abs(imp).toFixed(3)+'s faster)':'Best lap from '+lapWeeks[0].bestLapStr+' to '+lapWeeks[lapWeeks.length-1].bestLapStr+' ('+Math.abs(imp).toFixed(3)+'s slower)');
          } else {
            // SoF-adjusted
            const sofW=w.filter(x=>x.avgSof>0);
            if(sofW.length>=2){
              const scores=sofW.map(x=>x.bestPos/(x.avgSof/1000));
              const imp=scores[0]-scores[scores.length-1];
              if(imp>0.3){trendColor='#3fb950';trendLabel='📈 Verbesserung (SoF-adj.)';}
              else if(imp>-0.3){trendColor='#e3b341';trendLabel='→ Plateau (SoF-adj.)';}
              else{trendColor='#f85149';trendLabel='📉 Verschlechterung (SoF-adj.)';}
              summaryLine=t('no_lap_data');
            } else {
              trendLabel='Zu wenig Daten';summaryLine='';
            }
          }

          // ── Chart (lap times per week) ──
          let chartEl=null;
          if(hasLaps){
            const W2=560,H2=72,pdL=8,pdR=8,pdT=14,pdB=8;
            const maxS=Math.max(...lapWeeks.map(x=>x.bestLap));
            const minS=Math.min(...lapWeeks.map(x=>x.bestLap));
            const range=maxS-minS||0.5;
            const xSt=lapWeeks.length>1?(W2-pdL-pdR)/(lapWeeks.length-1):0;
            const yS=s=>pdT+(s-minS)/range*(H2-pdT-pdB);
            const pts=lapWeeks.map((x,i)=>`${pdL+i*xSt},${yS(x.bestLap)}`).join(' ');
            const bestSec=Math.min(...lapWeeks.map(x=>x.bestLap));
            chartEl=h('svg',{width:'100%',height:String(H2),viewBox:'0 0 '+W2+' '+H2,style:{display:'block',marginBottom:'6px'}},
              h('polyline',{points:pts,fill:'none',stroke:'#e3b341',strokeWidth:'2',strokeLinejoin:'round'}),
              ...lapWeeks.map((x,i)=>{
                const isB=x.bestLap===bestSec;
                const cx=String(pdL+i*xSt),cy=String(yS(x.bestLap));
                return h('g',{},
                  h('circle',{cx,cy,r:isB?'5':'4',fill:isB?'#ffd700':'#58a6ff',stroke:'#0d1117',strokeWidth:'2'}),
                  h('text',{x:cx,y:'11',textAnchor:'middle',fill:'#484f58',fontSize:'9',fontFamily:'monospace'},x.label.slice(5))
                );
              })
            );
          }

          return div({class:'card'},
            div({style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'10px'}},
              div({},
                div({style:{fontSize:'14px',fontWeight:'700',color:'#c9d1d9'}},tk.track),
                div({style:{fontSize:'11px',color:'#8b949e',marginTop:'2px'}},tk.car+' · '+w.length+(state.lang==='es'?' semanas · ':' weeks · ')+w.reduce((s,x)=>s+x.count,0)+' '+t('races'))
              ),
              div({style:{textAlign:'right'}},
                div({style:{fontSize:'12px',fontWeight:'700',color:trendColor}},trendLabel),
                summaryLine?div({style:{fontSize:'11px',color:'#8b949e',marginTop:'2px',maxWidth:'320px',textAlign:'right'}},summaryLine):null
              )
            ),
            chartEl,
            div({style:{display:'flex',gap:'6px',flexWrap:'wrap'}},
              ...w.map((x,i)=>{
                const isB=hasLaps&&x.bestLap&&x.bestLap===Math.min(...lapWeeks.map(y=>y.bestLap));
                return div({style:{background:isB?'#e3b34122':'#161b22',border:'1px solid '+(isB?'#e3b34144':'#21262d'),borderRadius:'6px',padding:'6px 10px',minWidth:'58px',textAlign:'center'}},
                  div({style:{fontSize:'9px',color:'#484f58',marginBottom:'2px'}},'W'+(i+1)+' · '+x.label.slice(5)),
                  div({style:{fontSize:'13px',fontWeight:'700',color:x.bestPos<=3?'#ffd700':x.bestPos<=5?'#3fb950':x.bestPos<=10?'#e3b341':'#f85149'}},'P'+x.bestPos),
                  x.bestLapStr?div({style:{fontSize:'10px',color:isB?'#e3b341':'#8b949e',fontFamily:'monospace',marginTop:'1px'}},x.bestLapStr):null,
                  x.count>1?div({style:{fontSize:'9px',color:'#484f58',marginTop:'1px'}},x.count+'x'):null
                );
              })
            )
          );
        }),
        singleWeekTracks.length>0?div({style:{background:'#161b22',border:'1px solid #30363d',borderRadius:'8px',padding:'12px 16px',marginTop:'4px'}},
          div({style:{fontSize:'11px',color:'#8b949e',fontWeight:'700',letterSpacing:'1px',marginBottom:'8px'}},t('not_enough_weeks')),
          div({style:{display:'flex',flexWrap:'wrap',gap:'6px'}},
            ...singleWeekTracks.map(tk=>span({style:{fontSize:'12px',color:'#484f58',background:'#0d1117',borderRadius:'6px',padding:'4px 10px',fontFamily:"'Courier New',monospace"}},tk.track+' · '+tk.weeks[0].count+'x'))
          )
        ):null
      );
    }
  }

  // ════════════════════════════════
  // 7. META-ANALYSE
  // ════════════════════════════════

  // ════════════════════════════════
  // SEASON-AUSWERTUNG
  // ════════════════════════════════
  else if(section==='season'){
    // ── nutzt globalen filtRaces (Road/Formula/Alle oben rechts) ──
    var seasonRaces = filtRaces;

    // ── iR mini-chart helper ──
    var mkChart = function(pts, W, H){
      if(!pts||pts.length<2) return null;
      var P=6, mn=Math.min.apply(null,pts), mx=Math.max.apply(null,pts);
      var rng=Math.max(mx-mn,80);
      var xp=pts.map(function(v,i){return P+i/(pts.length-1)*(W-2*P);});
      var yp=pts.map(function(v){return H-P-(v-mn)/rng*(H-2*P);});
      var poly=xp.map(function(x,i){return x.toFixed(1)+','+yp[i].toFixed(1);}).join(' ');
      var lc=pts[pts.length-1]>=pts[0]?'#3fb950':'#f85149';
      return h('svg',{width:'100%',height:String(H),viewBox:'0 0 '+W+' '+H,style:{display:'block'}},
        h('polygon',{points:xp[0].toFixed(1)+','+H+' '+poly+' '+xp[xp.length-1].toFixed(1)+','+H,fill:lc+'18'}),
        h('polyline',{points:poly,fill:'none',stroke:lc,strokeWidth:'1.8',strokeLinejoin:'round'})
      );
    };

    // ── group by season ──
    var seasonMap = {};
    seasonRaces.forEach(function(r){
      if(!r.seasonYear||!r.seasonQuarter) return;
      var key = r.seasonYear+'S'+r.seasonQuarter;
      if(!seasonMap[key]) seasonMap[key]={key:key,year:r.seasonYear,quarter:r.seasonQuarter,races:[]};
      seasonMap[key].races.push(r);
    });
    var seasonKeys = Object.keys(seasonMap).sort().reverse();
    var noSeasonCount = seasonRaces.filter(function(r){return !r.seasonYear||!r.seasonQuarter;}).length;

    if(seasonKeys.length===0){
      sectionContent = div({style:{textAlign:'center',padding:'40px 20px',color:'#8b949e'}},
        div({style:{fontSize:'36px',marginBottom:'12px'}},'📅'),
        div({style:{fontSize:'15px',fontWeight:'700'}},t('no_season_data'))
      );
    } else {

      // ════════════════════════════
      // SEASON-VERGLEICH (oben)
      // ════════════════════════════
      var compRows = seasonKeys.map(function(key){
        var s = seasonMap[key];
        var rs = s.races;
        var irT = rs.reduce(function(a,r){return a+iRDelta(r);},0);
        var irS = rs.slice().sort(function(a,b){return a.date.localeCompare(b.date);})[0];
        var irE = rs.slice().sort(function(a,b){return b.date.localeCompare(a.date);})[0];
        var avgP = rs.length>0?(rs.reduce(function(a,r){return a+r.pos;},0)/rs.length).toFixed(1):'–';
        var cleanPct = rs.length>0?Math.round(rs.filter(function(r){return r.inc===0;}).length/rs.length*100):0;
        var wins = rs.filter(function(r){return (r.classPos||r.pos)===1;}).length;
        var avgInc = rs.length>0?(rs.reduce(function(a,r){return a+r.inc;},0)/rs.length).toFixed(1):'–';
        var irC = irT>=0?'#3fb950':'#f85149';
        return h('tr',{style:{borderBottom:'1px solid #21262d44'}},
          h('td',{style:{padding:'9px 10px',color:'#58a6ff',fontWeight:'900',fontFamily:"'Courier New',monospace",whiteSpace:'nowrap'}},(s.year%100)+'S'+s.quarter),
          h('td',{style:{padding:'9px 10px',color:'#8b949e',fontSize:'12px'}},rs.length+' R'),
          h('td',{style:{padding:'9px 10px',color:irC,fontWeight:'900',fontFamily:"'Courier New',monospace"}},fmtD(irT)),
          h('td',{style:{padding:'9px 10px',color:'#c9d1d9',fontFamily:"'Courier New',monospace"}},
            (irS?irS.iRatingBefore:'?')+' → '+(irE?irE.iRatingAfter:'?')),
          h('td',{style:{padding:'9px 10px',color:'#c9d1d9',fontWeight:'700'}},'Ø P'+avgP),
          h('td',{style:{padding:'9px 10px',color:'#3fb950'}},'✓ '+cleanPct+'%'),
          h('td',{style:{padding:'9px 10px',color:'#ffd700'}},'🥇 '+wins),
          h('td',{style:{padding:'9px 10px',color:'#e3b341'}},avgInc+'x')
        );
      });

      // overlaid iR chart
      var compChartEl = null;
      if(seasonKeys.length>=2){
        var CW=500, CH=80, CP=8;
        var allPts = seasonKeys.map(function(key){
          var rs = seasonMap[key].races.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
          return rs.map(function(r){return r.iRatingAfter;}).filter(Boolean);
        });
        var allVals = [].concat.apply([],allPts);
        var cmn=Math.min.apply(null,allVals), cmx=Math.max.apply(null,allVals);
        var crng=Math.max(cmx-cmn,80);
        var catCols = ['#58a6ff','#3fb950','#e3b341','#f0883e'];
        var svgChildren = [];
        allPts.forEach(function(pts,si){
          if(pts.length<2) return;
          var xp=pts.map(function(v,i){return CP+i/(pts.length-1)*(CW-2*CP);});
          var yp=pts.map(function(v){return CH-CP-(v-cmn)/crng*(CH-2*CP);});
          var poly=xp.map(function(x,i){return x.toFixed(1)+','+yp[i].toFixed(1);}).join(' ');
          var col=catCols[si]||'#8b949e';
          svgChildren.push(h('polyline',{points:poly,fill:'none',stroke:col,strokeWidth:'1.8',strokeLinejoin:'round','stroke-dasharray':si===0?'none':'4,3'}));
          // last dot
          var lx=xp[xp.length-1], ly=yp[yp.length-1];
          svgChildren.push(h('circle',{cx:lx.toFixed(1),cy:ly.toFixed(1),r:'3',fill:col}));
        });
        compChartEl = h('svg',{width:'100%',height:String(CH),viewBox:'0 0 '+CW+' '+CH,style:{display:'block'}},
          ...svgChildren
        );
      }

      var legendItems = seasonKeys.map(function(key,si){
        var cols=['#58a6ff','#3fb950','#e3b341','#f0883e'];
        var col=cols[si]||'#8b949e';
        var s=seasonMap[key];
        return span({style:{display:'inline-flex',alignItems:'center',gap:'5px',fontSize:'11px',color:col,marginRight:'12px'}},
          h('span',{style:{width:'16px',height:'2px',background:col,borderRadius:'1px',display:'inline-block',borderBottom:si>0?'2px dashed '+col:'none'}}),
          (s.year%100)+'S'+s.quarter
        );
      });

      var compCard = div({class:'card',style:{marginBottom:'16px'}},
        div({style:{fontSize:'11px',color:'#8b949e',fontWeight:'700',letterSpacing:'1px',marginBottom:'12px'}},'📊 SEASON-VERGLEICH'),
        div({style:{overflowX:'auto',marginBottom:compChartEl?'12px':'0'}},
          h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'12px',fontFamily:"'Courier New',monospace"}},
            h('thead',{},h('tr',{},
              ...['Season',t('races'),'iR Δ','iR Start→End','Ø Pos',t('clean_short'),t('wins'),'Inc Ø'].map(function(col){
                return h('th',{style:{textAlign:'left',padding:'7px 10px',color:'#484f58',fontSize:'10px',letterSpacing:'1px',fontWeight:'700',borderBottom:'1px solid #21262d',textTransform:'uppercase'}},col);
              })
            )),
            h('tbody',{},...compRows)
          )
        ),
        compChartEl ? div({style:{background:'#0a0d11',borderRadius:'8px',padding:'10px 12px'}},
          div({style:{display:'flex',alignItems:'center',gap:'4px',marginBottom:'6px'}}, ...legendItems),
          compChartEl
        ) : null
      );

      // ════════════════════════════
      // SEASON-KARTEN
      // ════════════════════════════
      var seasonCards = seasonKeys.map(function(key){
        var s = seasonMap[key];
        var rs = s.races.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
        var irTotal = rs.reduce(function(a,r){return a+iRDelta(r);},0);
        var irStart = rs[0]?rs[0].iRatingBefore:0;
        var irEnd   = rs[rs.length-1]?rs[rs.length-1].iRatingAfter:0;
        var avgPos  = rs.length>0?(rs.reduce(function(a,r){return a+r.pos;},0)/rs.length).toFixed(1):'–';
        var cleanN  = rs.filter(function(r){return r.inc===0;}).length;
        var wins    = rs.filter(function(r){return (r.classPos||r.pos)===1;}).length;
        var podiums = rs.filter(function(r){return (r.classPos||r.pos)<=3;}).length;
        var avgInc  = rs.length>0?(rs.reduce(function(a,r){return a+r.inc;},0)/rs.length).toFixed(1):'–';
        var irColor = irTotal>=0?'#3fb950':'#f85149';

        var iRPts = rs.map(function(r){return r.iRatingAfter;}).filter(Boolean);
        var chartEl = mkChart(iRPts, 400, 52);

        // ── week map ──
        var weekMap = {};
        rs.forEach(function(r){
          if(r.raceWeek==null) return;
          if(!weekMap[r.raceWeek]) weekMap[r.raceWeek]=[];
          weekMap[r.raceWeek].push(r);
        });
        var weeks = Object.keys(weekMap).sort(function(a,b){return +a-+b;});

        // pre-calc week iR for comparison
        var weekIRs = weeks.map(function(wk){
          return weekMap[wk].reduce(function(a,r){return a+iRDelta(r);},0);
        });
        var weekAvgIR = weekIRs.length>0 ? weekIRs.reduce(function(a,b){return a+b;},0)/weekIRs.length : 0;
        var bestWeekIR = Math.max.apply(null,weekIRs);
        var worstWeekIR = Math.min.apply(null,weekIRs);

        // ── render week rows ──
        var weekRows = weeks.map(function(wk, wi){
          var wr = weekMap[wk].slice().sort(function(a,b){return a.date.localeCompare(b.date);});
          var wIR = weekIRs[wi];
          var wClean = wr.filter(function(r){return r.inc===0;}).length;
          var wColor = wIR>=0?'#3fb950':'#f85149';
          var wkKey = 'swk_'+key+'_'+wk;
          var isOpen = !!state[wkKey];

          // unique tracks
          var trackList = [];
          wr.forEach(function(r){
            var tn=(r.track||'').split(' - ')[0].split(' \u2013 ')[0];
            if(trackList.indexOf(tn)===-1) trackList.push(tn);
          });
          var wTrackLabel = trackList.length===1?trackList[0]:trackList.length+' '+(state.lang==='es'?'pistas':'tracks');

          // week review: vs average
          var vsAvg = wIR - weekAvgIR;
          var isBest = wIR===bestWeekIR && weekIRs.length>1;
          var isWorst = wIR===worstWeekIR && weekIRs.length>1;
          var reviewTag = null;
          if(isBest) reviewTag = span({style:{fontSize:'10px',color:'#ffd700',background:'#ffd70022',border:'1px solid #ffd70033',borderRadius:'4px',padding:'1px 6px',flexShrink:'0'}},'🏆 beste Woche');
          else if(isWorst) reviewTag = span({style:{fontSize:'10px',color:'#f85149',background:'#f8514922',border:'1px solid #f8514933',borderRadius:'4px',padding:'1px 6px',flexShrink:'0'}},'📉 schlechteste');
          else if(vsAvg>50) reviewTag = span({style:{fontSize:'10px',color:'#3fb950',background:'#3fb95022',borderRadius:'4px',padding:'1px 6px',flexShrink:'0'}},'↑ +'+Math.round(vsAvg)+' vs Ø');
          else if(vsAvg<-50) reviewTag = span({style:{fontSize:'10px',color:'#f85149',background:'#f8514922',borderRadius:'4px',padding:'1px 6px',flexShrink:'0'}},'↓ '+Math.round(vsAvg)+' vs Ø');

          // ── expanded content: tracks → races ──
          var expandedContent = null;
          if(isOpen){
            // split by category if both present
            var hasFormula = wr.some(function(r){return r.category==='formula';});
            var hasRoad    = wr.some(function(r){return r.category==='road';});
            var catGroups = [];
            if(hasFormula && hasRoad){
              catGroups = [
                {label:'🔵 Formula', color:'#58a6ff', races:wr.filter(function(r){return r.category==='formula';})},
                {label:'🟢 Road',    color:'#3fb950', races:wr.filter(function(r){return r.category!=='formula';})},
              ];
            } else {
              catGroups = [{label:null, color:null, races:wr}];
            }

            var catBlocks = catGroups.map(function(cg){
              // group by track
              var tMap = {};
              cg.races.forEach(function(r){
                var tn=(r.track||'').split(' - ')[0].split(' \u2013 ')[0];
                if(!tMap[tn]) tMap[tn]=[];
                tMap[tn].push(r);
              });
              var tKeys = Object.keys(tMap);

              var trackBlocks = tKeys.map(function(tn){
                var tr = tMap[tn].slice().sort(function(a,b){return a.date.localeCompare(b.date);});
                var tIR = tr.reduce(function(a,r){return a+iRDelta(r);},0);
                var tClean = tr.filter(function(r){return r.inc===0;}).length;
                var tColor = tIR>=0?'#3fb950':'#f85149';
                var tkKey = 'stk_'+key+'_'+wk+'_'+tn.replace(/\s/g,'_');
                var tkOpen = !!state[tkKey];

                var raceRows = tkOpen ? div({style:{background:'#0a0d11',overflow:'hidden'}},
                  tr.map(function(r,ri){
                    var delta=iRDelta(r);
                    var pos=r.classPos||r.pos;
                    return div({style:{display:'flex',alignItems:'center',gap:'10px',padding:'5px 14px',fontSize:'12px',borderTop:'1px solid #21262d22'}},
                      span({style:{minWidth:'32px',color:posColor(pos),fontWeight:'900',fontFamily:"'Courier New',monospace"}},'P'+pos),
                      span({style:{minWidth:'40px',color:'#484f58',fontSize:'11px'}},(r.date||'').slice(5,10)),
                      span({style:{flex:'1',color:'#8b949e',fontSize:'11px'}},'SoF '+r.sof+' · '+r.car),
                      r.inc===0?span({style:{color:'#3fb950',fontSize:'11px',flexShrink:'0'}},'✓'):
                               span({style:{color:r.inc>=8?'#f85149':'#e3b341',fontSize:'11px',flexShrink:'0'}},r.inc+'x'),
                      span({style:{minWidth:'54px',textAlign:'right',color:delta>0?'#3fb950':delta<0?'#f85149':'#8b949e',fontWeight:'700',fontFamily:"'Courier New',monospace",flexShrink:'0'}},fmtD(delta))
                    );
                  })
                ) : null;

                var tkHdr = div({style:{display:'flex',alignItems:'center',gap:'10px',padding:'6px 14px',background:'#0d1117',cursor:'pointer',borderTop:'1px solid #21262d22'}},
                  span({style:{flex:'1',color:'#c9d1d9',fontWeight:'700',fontSize:'12px'}},'⬡ '+tn),
                  span({style:{color:'#8b949e',fontSize:'11px',flexShrink:'0'}},tr.length+'x'),
                  tClean===tr.length?span({style:{color:'#3fb950',fontSize:'11px',flexShrink:'0'}},'✓ clean'):span({style:{color:'#8b949e',fontSize:'11px',flexShrink:'0'}},tClean+' clean'),
                  span({style:{minWidth:'56px',textAlign:'right',color:tColor,fontWeight:'700',fontFamily:"'Courier New',monospace",fontSize:'12px',flexShrink:'0'}},fmtD(tIR)),
                  span({style:{color:'#484f58',fontSize:'10px',flexShrink:'0'}},tkOpen?'[-]':'[+]')
                );
                tkHdr.addEventListener('click',function(){state[tkKey]=!tkOpen;render();});
                return div({},tkHdr, raceRows);
              });

              return div({},
                cg.label ? div({style:{fontSize:'11px',color:cg.color,fontWeight:'700',letterSpacing:'1px',padding:'6px 14px',background:'#161b22',borderTop:'1px solid #21262d'}},cg.label) : null,
                ...trackBlocks
              );
            });

            expandedContent = div({style:{borderTop:'1px solid #21262d',background:'#161b22'}}, ...catBlocks);
          }

          var rowHdr = div({style:{display:'flex',alignItems:'center',gap:'8px',padding:'8px 12px',background:'#0d1117',cursor:'pointer',userSelect:'none'}},
            span({style:{minWidth:'28px',color:'#58a6ff',fontWeight:'900',fontFamily:"'Courier New',monospace",fontSize:'12px'}},'W'+wk),
            span({style:{flex:'1',color:'#c9d1d9',fontWeight:'700',fontSize:'13px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},wTrackLabel),
            reviewTag,
            span({style:{color:'#8b949e',fontSize:'11px',flexShrink:'0'}},wr.length+'x'),
            wClean===wr.length?span({style:{color:'#3fb950',fontSize:'11px',flexShrink:'0'}},'✓ all clean'):span({style:{color:'#8b949e',fontSize:'11px',flexShrink:'0'}},wClean+' clean'),
            span({style:{minWidth:'58px',textAlign:'right',color:wColor,fontWeight:'900',fontFamily:"'Courier New',monospace",fontSize:'13px',flexShrink:'0'}},fmtD(wIR)),
            span({style:{color:'#484f58',fontSize:'10px',flexShrink:'0'}},isOpen?'[-]':'[+]')
          );
          rowHdr.addEventListener('click',function(){state[wkKey]=!isOpen;render();});

          return div({style:{border:'1px solid #21262d',borderRadius:'6px',marginBottom:'4px',overflow:'hidden'}},rowHdr,expandedContent);
        });

        return div({class:'card',style:{marginBottom:'16px'}},
          // season header
          div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px',flexWrap:'wrap',gap:'8px'}},
            div({style:{display:'flex',alignItems:'center',gap:'10px'}},
              div({style:{background:'#161b22',border:'1px solid #30363d',borderRadius:'8px',padding:'8px 12px',textAlign:'center',flexShrink:'0'}},
                div({style:{fontSize:'10px',color:'#58a6ff',fontWeight:'700',letterSpacing:'1px'}},'SEASON'),
                div({style:{fontSize:'18px',fontWeight:'900',color:'#c9d1d9',fontFamily:"'Courier New',monospace"}},(s.year%100)+'S'+s.quarter)
              ),
              div({},
                div({style:{fontSize:'13px',color:'#8b949e'}},rs.length+' '+t('races')+'  Ø P'+avgPos+'  '+cleanN+' '+t('clean_short').replace('✓ ','')),
                div({style:{fontSize:'11px',color:'#484f58'}},'iR: '+(irStart||'?')+' → '+(irEnd||'?'))
              )
            ),
            div({style:{textAlign:'right'}},
              div({style:{fontSize:'26px',fontWeight:'900',color:irColor,fontFamily:"'Courier New',monospace"}},fmtD(irTotal)),
              div({style:{fontSize:'10px',color:'#8b949e',letterSpacing:'1px'}},'iR GESAMT')
            )
          ),
          // iR chart
          chartEl ? div({style:{background:'#0a0d11',borderRadius:'8px',padding:'8px 12px',marginBottom:'10px'}},
            div({style:{fontSize:'10px',color:'#484f58',letterSpacing:'1px',fontWeight:'700',marginBottom:'2px'}},'iR-VERLAUF'),
            chartEl
          ) : null,
          // stats
          div({style:{display:'flex',gap:'6px',marginBottom:'10px'}},
            div({style:{flex:'1',background:'#0d1117',borderRadius:'8px',padding:'8px',textAlign:'center'}},div({style:{fontSize:'18px',color:'#ffd700',fontWeight:'900',fontFamily:"'Courier New',monospace"}},wins),div({style:{fontSize:'10px',color:'#484f58'}},t('wins'))),
            div({style:{flex:'1',background:'#0d1117',borderRadius:'8px',padding:'8px',textAlign:'center'}},div({style:{fontSize:'18px',color:'#c0c0c0',fontWeight:'900',fontFamily:"'Courier New',monospace"}},podiums),div({style:{fontSize:'10px',color:'#484f58'}},t('podiums'))),
            div({style:{flex:'1',background:'#0d1117',borderRadius:'8px',padding:'8px',textAlign:'center'}},div({style:{fontSize:'18px',color:'#3fb950',fontWeight:'900',fontFamily:"'Courier New',monospace"}},Math.round(cleanN/rs.length*100)+'%'),div({style:{fontSize:'10px',color:'#484f58'}},'Sauber')),
            div({style:{flex:'1',background:'#0d1117',borderRadius:'8px',padding:'8px',textAlign:'center'}},div({style:{fontSize:'18px',color:'#e3b341',fontWeight:'900',fontFamily:"'Courier New',monospace"}},avgInc+'x'),div({style:{fontSize:'10px',color:'#484f58'}},'Inc Ø'))
          ),
          // week rows
          weeks.length>0 ? div({},
            div({style:{fontSize:'10px',color:'#484f58',fontWeight:'700',letterSpacing:'1px',marginBottom:'6px'}},state.lang==='es'?'SEMANAS — clic para expandir':'WEEKS — click to expand'),
            div({},...weekRows)
          ) : null
        );
      });

      var allIR = seasonRaces.reduce(function(a,r){return a+iRDelta(r);},0);
      var summaryBar = div({style:{background:'#0d111711',border:'1px solid #21262d',borderRadius:'8px',padding:'10px 16px',marginBottom:'14px',display:'flex',gap:'16px',flexWrap:'wrap',alignItems:'center'}},
        div({},span({style:{color:'#8b949e',fontSize:'12px'}},t('total_label')+' '),span({style:{color:'#c9d1d9',fontWeight:'700',fontFamily:"'Courier New',monospace"}},seasonRaces.length+' '+t('races'))),
        div({},span({style:{color:'#8b949e',fontSize:'12px'}},'iR-Bilanz '),span({style:{color:allIR>=0?'#3fb950':'#f85149',fontWeight:'900',fontFamily:"'Courier New',monospace",fontSize:'15px'}},fmtD(allIR))),
        div({},span({style:{color:'#8b949e',fontSize:'12px'}},'Seasons '),span({style:{color:'#c9d1d9',fontWeight:'700'}},seasonKeys.length.toString())),
        noSeasonCount>0?div({},span({style:{color:'#e3b341',fontSize:'11px'}},'⚠️ '+noSeasonCount+state.lang==='es'?' sin datos de temporada':' without season data')):null
      );
      sectionContent = div({}, summaryBar, compCard, ...seasonCards);
    }
  }


  return div({style:{padding:'20px',display:'flex',flexDirection:'column',gap:'16px'}},
    // Header
    div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'10px'}},
      div({},
        div({style:{fontSize:'18px',fontWeight:'900',color:'#c9d1d9',letterSpacing:'1px'}},t('tab_statistiken')),
        div({style:{fontSize:'12px',color:'#8b949e'}},filtRaces.length+' '+t('races'))
      ),
      catBtns
    ),
    // Section nav
    div({style:{background:'#0d1117',borderRadius:'10px',overflow:'hidden',border:'1px solid #21262d'}},
      secNav,
      div({style:{padding:'16px'}}, sectionContent)
    )
  );
}

function render(){
  const {races,flagged,tab,modal} = state;
  if(!state.lang) state.lang = getLang();
  const app=document.getElementById('app');
  app.innerHTML='';

  // ── Header ──
  const header=div({style:{background:'linear-gradient(180deg,#0d1117 0%,#0a0c10 100%)',borderBottom:'1px solid #21262d',padding:'16px 20px'}},
    div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'10px'}},
      div({style:{display:'flex',alignItems:'center',gap:'10px'}},
        span({style:{fontSize:'22px'}},'🏁'),
        div({},
          div({style:{fontSize:'18px',fontWeight:'900',letterSpacing:'2px',color:'#fff',textTransform:'uppercase'}},t('app_title')),
          div({style:{fontSize:'11px',color:'#8b949e',letterSpacing:'1px'}},t('app_subtitle'))
        )
      ),
      div({style:{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}},
        renderLangButtons(),
        span({style:{fontSize:'11px',color:'#484f58',fontFamily:"'Courier New',monospace",padding:'4px 8px',border:'1px solid #21262d',borderRadius:'6px'}}, 'v0.1.0-beta')
      )
    )
  );

  // ── Tab bar ──
  const oppCount=loadOpponents().length;
  const tabs=[
    ['stats',       '📈 '+t('tab_stats'),       t('tab_stats_sub')],
    ['races',       '🏎️ '+t('tab_races'),       (races.length||0)+' '+t('races')],
    ['opponents',   '🌐 '+t('tab_opponents'),    oppCount+' '+t('encounters')],
    ['zeitanalyse', '📊 '+t('tab_zeit'),         t('zeit_subtitle')],
    ['statistiken', '📊 '+t('tab_statistiken'),  t('tab_stats_sub')],
    ['docs',        '📖 '+t('tab_docs'),         t('docs_title')],
    ['config',      '⚙️ '+t('tab_config'),       t('tab_config_sub')],
  ];

  const tabBar=div({id:'main-tab-bar',style:{display:'flex',borderBottom:'1px solid #21262d',background:'#0d1117',position:'sticky',top:'0',zIndex:'20',overflowX:'auto'}},
    ...tabs.map(([id,lbl,sub])=>btn({class:'tab-btn'+(tab===id?' active':''),onClick:()=>setState({tab:id})},
      div({style:{fontSize:'16px'}},lbl),
      div({style:{fontSize:'11px',opacity:'0.7'}},sub)
    ))
  );

  // ── Content ──
  const content=div({style:{maxWidth:'1100px',margin:'0 auto'}});
  if(tab==='stats') content.appendChild(renderStats());
  else if(tab==='races') content.appendChild(renderRaces());
  else if(tab==='zeitanalyse') content.appendChild(renderZeitanalyse());
  else if(tab==='opponents') content.appendChild(renderOpponents());
  else if(tab==='statistiken') content.appendChild(renderStatistiken());
  else if(tab==='docs') content.appendChild(renderDocs());
  else if(tab==='config') content.appendChild(renderConfig());

  app.appendChild(header);
  app.appendChild(tabBar);
  app.appendChild(content);

  const m=renderModal();
  if(m) app.appendChild(m);

  renderFixedCatSidebar(races||[]);
}

// ── CONFIG TAB ──
function renderConfig(){
  const cfg=loadConfig();
  const wrap=div({style:{padding:'20px',display:'flex',flexDirection:'column',gap:'20px',maxWidth:'700px',margin:'0 auto'}});

  // ── Hero ──
  const hero=div({style:{background:'linear-gradient(135deg,#161b22 0%,#0d1117 100%)',border:'1px solid #30363d',borderRadius:'14px',padding:'28px 32px'}});
  hero.innerHTML=`
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:8px">
      <span style="font-size:32px">⚙️</span>
      <div>
        <div style="font-size:22px;font-weight:900;letter-spacing:2px;color:#fff">${t('cfg_title')}</div>
        <div style="font-size:12px;color:#8b949e;margin-top:3px">${t('tab_config_sub')}</div>
      </div>
    </div>
  `;
  wrap.appendChild(hero);

  // ── My Profile ──
  const profileCard=div({class:'card',style:{display:'flex',flexDirection:'column',gap:'16px'}});
  profileCard.appendChild(div({style:{fontSize:'14px',fontWeight:'900',color:'#58a6ff',letterSpacing:'1px'}},
    '👤 '+t('cfg_profile')
  ));

  // Name input
  const nameLabel=div({style:{display:'flex',flexDirection:'column',gap:'6px'}});
  nameLabel.appendChild(h('label',{class:'lbl'},t('cfg_my_name')));
  const nameInp=inp({type:'text','data-focus-key':'cfg-name',value:cfg.myName||'',placeholder:'Jose Avila B.',style:{background:'#0d1117',fontFamily:"'Courier New',monospace"}});
  nameLabel.appendChild(nameInp);
  nameLabel.appendChild(div({style:{fontSize:'11px',color:'#8b949e',lineHeight:'1.5'}},t('cfg_my_name_hint')));
  profileCard.appendChild(nameLabel);

  // CustId input
  const custLabel=div({style:{display:'flex',flexDirection:'column',gap:'6px'}});
  custLabel.appendChild(h('label',{class:'lbl'},t('cfg_my_custid')));
  const custInp=inp({type:'text','data-focus-key':'cfg-custid',value:cfg.myCustId||loadLS('iracing-v3-custid','')||'',placeholder:'123456',style:{background:'#0d1117',fontFamily:"'Courier New',monospace"}});
  custLabel.appendChild(custInp);
  custLabel.appendChild(div({style:{fontSize:'11px',color:'#8b949e',lineHeight:'1.5'}},t('cfg_my_custid_hint')));
  profileCard.appendChild(custLabel);

  wrap.appendChild(profileCard);

  // ── Teammates ──
  const teamCard=div({class:'card',style:{display:'flex',flexDirection:'column',gap:'14px'}});
  teamCard.appendChild(div({style:{fontSize:'14px',fontWeight:'900',color:'#3fb950',letterSpacing:'1px'}},
    '🤝 '+t('cfg_team')
  ));
  teamCard.appendChild(div({style:{fontSize:'12px',color:'#8b949e',lineHeight:'1.5'}},t('cfg_team_hint')));

  const tmList=div({style:{display:'flex',flexDirection:'column',gap:'8px'}});
  const teammates=[...(cfg.teammates||[])];

  teammates.forEach((tm,i)=>{
    const row=div({style:{display:'flex',gap:'8px',alignItems:'center'}});
    const tmInp=inp({type:'text','data-focus-key':'cfg-tm-'+i,value:tm,placeholder:t('cfg_tm_placeholder'),style:{background:'#0d1117',fontFamily:"'Courier New',monospace",flex:'1'}});
    tmInp.addEventListener('input',e=>{teammates[i]=e.target.value;});
    row.appendChild(span({style:{fontSize:'16px',color:'#3fb950',flexShrink:'0'}},'🤝'));
    row.appendChild(tmInp);
    row.appendChild(btn({class:'btn-outline',style:{color:'#f85149',borderColor:'#f8514944',padding:'8px 12px',flexShrink:'0'},onClick:()=>{
      teammates.splice(i,1);
      const newCfg={...loadConfig(),teammates:[...teammates]};
      saveConfig(newCfg);
      setState({});
    }},'✕'));
    tmList.appendChild(row);
  });

  teamCard.appendChild(tmList);

  teamCard.appendChild(btn({class:'btn-outline',style:{alignSelf:'flex-start',color:'#3fb950',borderColor:'#3fb95044'},onClick:()=>{
    teammates.push('');
    const newCfg={...loadConfig(),teammates:[...teammates]};
    saveConfig(newCfg);
    setState({});
  }},t('cfg_add_tm')));

  wrap.appendChild(teamCard);

  // ── Save button ──
  const saveMsg=span({style:{fontSize:'13px',color:'#3fb950',opacity:'0',transition:'opacity .3s'}},t('cfg_saved'));
  const saveBar=div({style:{display:'flex',gap:'12px',alignItems:'center'}},
    btn({class:'btn',style:{background:'#238636',padding:'12px 28px',fontSize:'14px'},onClick:()=>{
      const newCfg={
        myName:nameInp.value.trim(),
        myCustId:custInp.value.trim()||null,
        teammates:teammates.filter(t=>t.trim()!=='')
      };
      saveConfig(newCfg);
      if(newCfg.myCustId) saveCustId(newCfg.myCustId);
      saveMsg.style.opacity='1';
      setTimeout(()=>{saveMsg.style.opacity='0';},2500);
    }},t('cfg_save')),
    saveMsg
  );
  wrap.appendChild(saveBar);

  // ── Danger Zone ──
  const dangerCard=div({class:'card',style:{borderColor:'#f8514944',display:'flex',flexDirection:'column',gap:'14px'}});
  dangerCard.appendChild(div({style:{fontSize:'14px',fontWeight:'900',color:'#f85149',letterSpacing:'1px'}},
    '⚠️ '+t('cfg_danger')
  ));

  dangerCard.appendChild(div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',gap:'12px',flexWrap:'wrap'}},
    div({style:{flex:'1'}},
      div({style:{fontSize:'13px',color:'#c9d1d9',fontWeight:'700'}},t('cfg_reset_id')),
      div({style:{fontSize:'11px',color:'#8b949e'}},t('cfg_reset_id_hint'))
    ),
    btn({class:'btn-outline',style:{color:'#f0883e',borderColor:'#f0883e44',flexShrink:'0'},onClick:()=>{
      const c=loadConfig();c.myCustId=null;saveConfig(c);
      try{localStorage.removeItem('iracing-v3-custid');}catch(e){}
      alert('✅ Driver ID reset.');
      setState({});
    }},'🔄 Reset')
  ));

  dangerCard.appendChild(div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',gap:'12px',flexWrap:'wrap'}},
    div({style:{flex:'1'}},
      div({style:{fontSize:'13px',color:'#c9d1d9',fontWeight:'700'}},t('cfg_reset_all')),
      div({style:{fontSize:'11px',color:'#8b949e'}},t('cfg_reset_all_hint'))
    ),
    btn({class:'btn-outline',style:{color:'#f85149',borderColor:'#f8514944',flexShrink:'0'},onClick:()=>{
      const lang=state.lang||'es';
      const msg=lang==='es'
        ?'⚠️ ¿Realmente eliminar TODOS los datos?\n\nTodas las carreras, rivales, ajustes y configuración serán eliminados.\n¡Esto NO se puede deshacer!'
        :'⚠️ Really delete ALL data?\n\nAll races, opponents, settings and configuration will be deleted.\nThis CANNOT be undone!';
      if(!confirm(msg)) return;
      try{
        const keys=[DB_KEY, FL_KEY, OPP_KEY, CFG_KEY, 'iracing-v3-custid', 'iracing-v3-lang'];
        keys.forEach(k=>localStorage.removeItem(k));
        // Also remove any other iracing-v3 keys
        Object.keys(localStorage).filter(k=>k.startsWith('iracing-v3')).forEach(k=>localStorage.removeItem(k));
      }catch(e){}
      // Force clean state before reload so init() doesn't restore seed data
      state.races=[];
      state.flagged=[];
      saveLS(DB_KEY,[]);
      saveLS(FL_KEY,[]);
      location.reload();
    }},'🗑️ Delete')
  ));

  wrap.appendChild(dangerCard);
  return wrap;
}

// ── Driver Picker Modal ──
function renderDriverPickerModal(drivers, jsonText, meta){
  const content=div({style:{display:'flex',flexDirection:'column',gap:'16px'}});

  content.appendChild(div({style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
    div({},
      div({style:{fontSize:'18px',fontWeight:'900',color:'#fff'}},t('cfg_pick_driver')),
      div({style:{fontSize:'13px',color:'#8b949e',marginTop:'4px'}},t('cfg_pick_hint'))
    ),
    btn({style:{background:'none',border:'none',color:'#8b949e',fontSize:'20px',cursor:'pointer',padding:'4px 8px'},onClick:closeModal},'✕')
  ));

  const list=div({style:{display:'flex',flexDirection:'column',gap:'6px',maxHeight:'400px',overflowY:'auto'}});

  drivers.forEach(d=>{
    const iR=d.oldi_rating||d.newi_rating||'?';
    const pos=(d.finish_position!=null?d.finish_position+1:d.position||'?');
    const name=(d.display_name||'').trim();
    const custId=d.cust_id;
    const country=d.country_code||'';

    const row=div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 14px',background:'#0d1117',border:'1px solid #21262d',borderRadius:'10px',cursor:'pointer',transition:'border-color .15s, background .15s'}});
    row.addEventListener('mouseenter',()=>{row.style.borderColor='#58a6ff';row.style.background='#161b22';});
    row.addEventListener('mouseleave',()=>{row.style.borderColor='#21262d';row.style.background='#0d1117';});
    row.addEventListener('click',()=>handleDriverPicked(custId, jsonText, meta));

    row.appendChild(div({style:{display:'flex',alignItems:'center',gap:'10px'}},
      div({style:{fontSize:'16px',fontWeight:'900',color:posColor(pos),fontFamily:"'Courier New',monospace",minWidth:'36px'}},'P'+pos),
      div({},
        div({style:{fontSize:'14px',fontWeight:'700',color:'#c9d1d9'}},name),
        div({style:{fontSize:'11px',color:'#8b949e'}},'ID: '+custId+(country?' · '+country:''))
      )
    ));
    row.appendChild(div({style:{textAlign:'right'}},
      div({class:'mono',style:{fontSize:'16px',color:'#58a6ff'}},iR+' iR')
    ));
    list.appendChild(row);
  });

  content.appendChild(list);
  return modalWrap(content, true);
}

// ── FIXED CAT SIDEBAR ──
function renderFixedCatSidebar(races){
  let el=document.getElementById('cat-fixed-sidebar');
  if(!el){el=document.createElement('div');el.id='cat-fixed-sidebar';document.body.appendChild(el);}

  const activeCats=Object.keys(CATEGORIES).filter(c=>races.some(r=>r.category===c));
  const catData=activeCats.map(c=>{
    const latest=races.filter(r=>r.category===c).sort((a,b)=>a.date.localeCompare(b.date)).slice(-1)[0];
    return {
      label:catEmoji(c)+' '+catLabel(c).toUpperCase(),
      color:catColor(c),
      ir:(latest?.iRatingAfter??'–').toString(),
      sr:(races.filter(r=>r.category===c&&r.srAfter!=null).slice(-1)[0]?.srAfter?.toFixed(2)??'–'),
      cnt:races.filter(r=>r.category===c).length
    };
  });

  const racesLabel=t('races');

  function updateSidebarTop(){
    const tabBar=document.getElementById('main-tab-bar');
    if(tabBar){const rect=tabBar.getBoundingClientRect();el.style.top=(rect.bottom+8)+'px';}
  }
  updateSidebarTop();
  if(!window._sidebarScrollBound){
    window._sidebarScrollBound=true;
    window.addEventListener('scroll',updateSidebarTop,{passive:true});
  }

  el.innerHTML=catData.map(({label,color,ir,sr,cnt})=>`
    <div style="background:#0d1117;border:1px solid ${color}44;border-radius:8px;overflow:hidden;font-family:'Courier New',monospace;box-shadow:0 2px 8px #00000066;">
      <div style="padding:5px 9px;background:${color}11;border-bottom:1px solid ${color}33;">
        <span style="font-size:9px;color:${color};letter-spacing:1px;font-weight:700;">${label}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;">
        <div style="padding:6px 9px;border-right:1px solid ${color}22;border-bottom:1px solid ${color}22;">
          <div style="font-size:8px;color:#8b949e;letter-spacing:1px;margin-bottom:1px;">iR</div>
          <div style="font-size:17px;color:${color};font-weight:900;line-height:1.15;">${ir}</div>
        </div>
        <div style="padding:6px 9px;border-bottom:1px solid ${color}22;">
          <div style="font-size:8px;color:#8b949e;letter-spacing:1px;margin-bottom:1px;">SR</div>
          <div style="font-size:17px;color:${color};font-weight:900;line-height:1.15;">${sr}</div>
        </div>
        <div style="padding:5px 9px;grid-column:span 2;">
          <div style="font-size:8px;color:#8b949e;letter-spacing:1px;margin-bottom:1px;">${racesLabel}</div>
          <div style="font-size:14px;color:#c9d1d9;font-weight:700;line-height:1.15;">${cnt}</div>
        </div>
      </div>
    </div>
  `).join('');
}
