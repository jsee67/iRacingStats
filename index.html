        div({style:{fontSize:'13px',fontWeight:'700',color:color}},tk.track),
        btn({class:'btn-outline',style:{fontSize:'11px',padding:'2px 8px',borderRadius:'6px'},onClick:()=>{state['selTrack_'+label]=null;render();}},'✕ '+t('close_lbl'))
      ),
      ...carStats.map(cs => div({style:{marginBottom: multiCar?'14px':'0'}},
        multiCar ? div({style:{fontSize:'12px',fontWeight:'700',color:'#8b949e',letterSpacing:'1px',marginBottom:'8px',paddingBottom:'4px',borderBottom:'1px solid #30363d'}},
          '🏎️ '+cs.short+' — '+cs.count+' '+t('races')
        ) : null,
        div({style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(115px,1fr))',gap:'8px'}},
          ...[
            ['📍 '+t('avg_pos'), 'P'+cs.avgPos, '#f0883e'],
            ['🏆 '+t('best'), 'P'+cs.best, '#ffd700'],
            ['⚠️ '+t('avg_inc'), cs.avgInc+'x', cs.incColor],
            [t('clean'), cs.clean+'/'+cs.count+' ('+Math.round(cs.clean/cs.count*100)+'%)', '#3fb950'],
            ['📈 '+t('ir_total'), fmtD(cs.irSum), cs.irSum>=0?'#3fb950':'#f85149'],
          ].concat(cs.bestLap ? [['⏱️ '+t('stat_bestzeiten'), cs.bestLap, '#e3b341']] : [])
          .map(function(arr){ return div({style:{background:'#161b22',borderRadius:'8px',padding:'8px 10px'}},
            div({style:{fontSize:'10px',color:'#8b949e',marginBottom:'3px',letterSpacing:'1px',fontWeight:'700'}},arr[0]),
            div({style:{fontSize:'13px',fontWeight:'700',color:arr[2],fontFamily:'Courier New,monospace'}},arr[1])
          );})
        )
      )),
      div({style:{fontSize:'11px',color:'#8b949e',marginBottom:'6px',letterSpacing:'1px',fontWeight:'700',marginTop:'14px'}},t('recent_races_lbl')),
      ...recentRaces.map(r=>{
        const rIncColor = r.inc===0?'#3fb950':r.inc<=2?'#e3b341':'#f85149';
        return div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderBottom:'1px solid #21262d',fontSize:'12px'}},
          div({style:{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}},
            div({style:{color:'#8b949e',fontFamily:'monospace'}},r.date.slice(5)),
            multiCar ? div({style:{fontSize:'10px',color:'#8b949e',background:'#21262d',padding:'1px 5px',borderRadius:'4px'}},shortName(r.car)) : null,
            div({style:{color:posColor(r.pos),fontWeight:'700',fontFamily:'monospace'}},'P'+r.pos),
            r.inc===0
              ? div({style:{color:'#3fb950',fontSize:'11px',fontWeight:'700'}},'✓ 0x')
              : div({style:{color:rIncColor,fontSize:'11px'}},r.inc+'x Inc'),
            r.fastestLap ? div({style:{color:'#e3b341',fontSize:'10px'}},'⏱ '+r.fastestLap) : null
          ),
          div({style:{color:iRDelta(r)>=0?'#3fb950':'#f85149',fontFamily:'monospace',fontWeight:'700',fontSize:'13px'}},fmtD(iRDelta(r)))
        );
      })
    );
  };

  const ext=chartRaces.filter(r=>r.dnf==='external');
  const self=chartRaces.filter(r=>r.dnf==='self');

  const statCard=(lbl,val,sub,col,ic)=>div({class:'card',style:{display:'flex',flexDirection:'column',gap:'4px'}},
    div({style:{fontSize:'11px',color:'#8b949e',letterSpacing:'1.5px',textTransform:'uppercase',fontWeight:'700'}},ic+' '+lbl),
    div({class:'mono',style:{fontSize:'26px',color:col,lineHeight:'1.1'}},val.toString()),
    sub?div({style:{fontSize:'12px',color:'#8b949e'}},sub):null
  );

  return div({style:{display:'flex',flexDirection:'column',gap:'16px'}},
    div({style:{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'10px',padding:'12px 16px',background:color+'11',border:`1px solid ${color}33`,borderRadius:'10px'}},
      div({style:{display:'flex',alignItems:'center',gap:'10px'}},
        span({style:{fontSize:'22px'}},catEmoji(chartRaces[0]?.category||'road')),
        div({},
          div({style:{fontSize:'16px',fontWeight:'900',color,letterSpacing:'1px'}},label),
          div({style:{fontSize:'12px',color:'#8b949e'}},chartRaces.length+' '+t('races')+' · iR: ',span({class:'mono',style:{color,fontWeight:'700'}},curIR),' ('+fmtD(gainIR)+' '+t('total_label')+')')
        )
      ),
      winButtons
    ),
    div({style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:'10px'}},
      statCard(t('wins'),wins,t('top5')+top5+' · '+t('top10')+top10,'#ffd700','🏆'),
      statCard(t('avg_pos'),avgPos,'','#f0883e','📍'),
      statCard(t('avg_inc'),avgInc,'',parseFloat(avgInc)<3?'#3fb950':'#f85149','⚠️'),
      statCard(t('clean_short'),clean+'/'+chartRaces.length,Math.round(clean/chartRaces.length*100)+'%','#3fb950','✓'),
      statCard(t('best_ir'),'+'+bestIR,'','#3fb950','📈'),
      statCard(t('worst_ir'),worstIR,'','#f85149','📉'),
      statCard(t('comeback'),'+'+bigComeback,'P'+(bigComebackR?.startPos||'?')+'→P'+(bigComebackR?.pos||'?'),'#f0883e','🚀'),
    ),
    div({class:'card'},
      div({style:{fontSize:'14px',fontWeight:'700',color:'#c9d1d9',marginBottom:'4px'}},catEmoji(chartRaces[0]?.category||'road')+' '+t('ir_history')),
      div({style:{fontSize:'12px',color:'#8b949e',marginBottom:'14px'}},t('ir_gain_start')+chartRaces[0].iRatingBefore+' → '+t('ir_gain_now')+curIR+' ('+fmtD(gainIR)+')'),
      svgLine(irData,'iR',color,600,160)
    ),
    srData.length>1?div({class:'card'},
      div({style:{fontSize:'14px',fontWeight:'700',color:'#c9d1d9',marginBottom:'4px'}},'🛡️ '+t('sr_history')),
      div({style:{fontSize:'12px',color:'#8b949e',marginBottom:'14px'}},t('ir_gain_start')+srData[0].sr.toFixed(2)+' → '+t('ir_gain_now')+srData[srData.length-1].sr.toFixed(2)+' ('+fmtD(parseFloat((srData[srData.length-1].sr-srData[0].sr).toFixed(2)))+')'),
      svgLine(srData,'sr','#f0883e',600,140,false,null,chartRaces.length)
    ):null,
    chartRaces.length>1?div({class:'card'},
      div({style:{fontSize:'14px',fontWeight:'700',color:'#c9d1d9',marginBottom:'4px'}},'⚠️ '+t('inc_history')),
      div({style:{display:'flex',alignItems:'baseline',gap:'16px',marginBottom:'14px'}},
        div({style:{fontSize:'12px',color:'#8b949e'}},t('current_avg'),span({class:'mono',style:{fontSize:'18px',color:curAvg<=2?'#3fb950':curAvg<=4?'#e3b341':'#f85149'}},curAvg.toString())),
        div({style:{fontSize:'12px',color:'#8b949e'}},t('trend'),span({style:{fontWeight:'700',color:trend<0?'#3fb950':trend>0?'#f85149':'#8b949e'}},trend<0?t('better'):trend>0?t('worse'):t('stable'),' ('+fmtD(parseFloat(trend.toFixed(2)))+')'))
      ),
      svgLine(incData,'avg','#e3b341',600,160,true,'inc'),
      div({style:{display:'flex',gap:'16px',marginTop:'8px',fontSize:'11px',color:'#8b949e'}},
        span({style:{color:'#3fb950'}},t('under2_clean')),
        span({style:{color:'#f85149'}},t('over4_critical'))
      )
    ):null,
    div({class:'card'},
      (()=>{
        const total = chartRaces.length;
        const cleanRaces = chartRaces.filter(r=>r.inc===0);
        const cleanPct = Math.round(cleanRaces.length/total*100);
        let streak=0;
        for(let i=chartRaces.length-1;i>=0;i--){if(chartRaces[i].inc===0)streak++;else break;}
        let best=0,cur=0;
        chartRaces.forEach(r=>{if(r.inc===0){cur++;best=Math.max(best,cur);}else cur=0;});
        const dist=[0,1,2,3,4,5].map(n=>chartRaces.filter(r=>r.inc===n).length);
        dist.push(chartRaces.filter(r=>r.inc>=6).length);
        const distMax=Math.max(...dist)||1;
        return div({},
          div({style:{fontSize:'14px',fontWeight:'700',color:'#c9d1d9',marginBottom:'14px'}},'✨ 0x Incidents'),
          div({style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:'8px',marginBottom:'16px'}},
            ...[
              [t('clean_short'),cleanRaces.length+'/'+total+' ('+cleanPct+'%)','#3fb950'],
              [t('current_streak'),streak+'x 0Inc '+t('inc_in_folge'),streak>=3?'#3fb950':streak>=1?'#e3b341':'#8b949e'],
              [t('best_streak'),best+'x 0Inc '+t('inc_in_folge'),'#58a6ff'],
            ].map(function(a){return div({style:{background:'#161b22',borderRadius:'8px',padding:'8px 10px'}},
              div({style:{fontSize:'10px',color:'#8b949e',letterSpacing:'1px',fontWeight:'700',marginBottom:'3px'}},a[0]),
              div({style:{fontSize:'13px',fontWeight:'700',color:a[2],fontFamily:'monospace'}},a[1])
            );})
          ),
          div({style:{fontSize:'11px',color:'#8b949e',letterSpacing:'1px',fontWeight:'700',marginBottom:'8px'}},t('inc_distribution')),
          div({style:{display:'flex',gap:'6px',alignItems:'flex-end',height:'60px'}},
            ...[0,1,2,3,4,5,'6+'].map(function(n,i){
              const count=dist[i]; const pct=count/distMax;
              const barColor=i===0?'#3fb950':i<=2?'#e3b341':'#f85149';
              return div({style:{flex:'1',display:'flex',flexDirection:'column',alignItems:'center',gap:'3px'}},
                div({style:{width:'100%',background:barColor+'33',borderRadius:'3px 3px 0 0',height:(pct*50+2)+'px',position:'relative'}},
                  count>0?div({style:{position:'absolute',top:'-16px',left:'50%',transform:'translateX(-50%)',fontSize:'10px',color:barColor,fontWeight:'700',fontFamily:'monospace'}},count):null
                ),
                div({style:{fontSize:'10px',color:'#8b949e',marginTop:'2px'}},n+'x')
              );
            })
          )
        );
      })()
    ),
    div({class:'card'},
      div({style:{fontSize:'14px',fontWeight:'700',color:'#c9d1d9',marginBottom:'14px'}},'📊 '+t('pos_dist')),
      svgBars(posDist,600,120,color)
    ),
    (ext.length>0||self.length>0)?div({class:'card'},
      div({style:{fontSize:'14px',fontWeight:'700',color:'#c9d1d9',marginBottom:'14px'}},t('ir_loss_analysis')),
      div({style:{display:'flex',flexDirection:'column',gap:'10px'}},
        ext.length>0?div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',background:'#f0883e11',border:'1px solid #f0883e33',borderRadius:'8px'}},
          div({},div({style:{fontSize:'14px',fontWeight:'700',color:'#f0883e'}},t('dnf_external_full')),div({style:{fontSize:'12px',color:'#8b949e',marginTop:'2px'}},ext.length+' '+t('races'))),
          div({class:'mono',style:{fontSize:'24px',color:'#f0883e'}},fmtD(ext.reduce((s,r)=>s+iRDelta(r),0)))
        ):null,
        self.length>0?div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',background:'#f8514911',border:'1px solid #f8514933',borderRadius:'8px'}},
          div({},div({style:{fontSize:'14px',fontWeight:'700',color:'#f85149'}},t('dnf_self_full')),div({style:{fontSize:'12px',color:'#8b949e',marginTop:'2px'}},self.length+' '+t('races')+' — '+t('dnf_self_comment'))),
          div({class:'mono',style:{fontSize:'24px',color:'#f85149'}},fmtD(self.reduce((s,r)=>s+iRDelta(r),0)))
        ):null
      )
    ):null,
    // ── FL-Gap Analysis ──
    (()=>{
      const lapToSecG = s => {
        if(!s) return null;
        const p = s.split(':');
        if(p.length===2) return parseFloat(p[0])*60+parseFloat(p[1]);
        return parseFloat(s);
      };
      const allOpps = loadOpponents();
      const oppByRace = {};
      allOpps.forEach(opp=>{
        (opp.encounters||[]).forEach(enc=>{
          if(!oppByRace[enc.raceId]) oppByRace[enc.raceId]=[];
          oppByRace[enc.raceId].push(enc);
        });
      });
      const gapData = chartRaces.filter(r=>r.fastestLap&&lapToSecG(r.fastestLap)&&!r.wetRace).map(r=>{
        const myLap = lapToSecG(r.fastestLap);
        const raceOpps = oppByRace[r.id]||[];
        const oppFLs = raceOpps.map(o=>lapToSecG(o.fl)).filter(v=>v&&v>30);
        let refLap=null, refType=null;
        if(oppFLs.length>0){
          refLap=Math.min(...oppFLs,myLap);
          refType='race';
        } else {
          const pbLaps = chartRaces.filter(r2=>r2.track===r.track&&r2.id!==r.id&&r2.fastestLap)
            .map(r2=>lapToSecG(r2.fastestLap)).filter(Boolean);
          if(pbLaps.length>0){ refLap=Math.min(...pbLaps); refType='personal'; }
        }
        if(!refLap) return null;
        const gap = myLap-refLap;
        return {date:r.date,track:r.track,myLap,refLap,gap,refType};
      }).filter(Boolean);

      if(gapData.length===0) return null;

      const avgGap = gapData.reduce((s,d)=>s+d.gap,0)/gapData.length;
      const bestGap = Math.min(...gapData.map(d=>d.gap));
      const raceCount = gapData.filter(d=>d.refType==='race').length;
      const pbCount   = gapData.filter(d=>d.refType==='personal').length;
      const fmtGap = g=>(g>0?'+':'')+g.toFixed(3)+'s';
      const gapCol  = g=>g<=0?'#ffd700':g<0.5?'#3fb950':g<1.5?'#e3b341':'#f85149';

      const W=600,H=100,ROLLG=5;
      const vals=gapData.map(d=>d.gap);
      const minV=Math.min(...vals),maxV=Math.max(...vals);
      const range=(maxV-minV)||0.001;
      const trendLen=gapData.length;
      const px=i=>(trendLen<=1?W/2:(i/(trendLen-1))*W);
      const py=v=>H-4-((v-minV)/range)*(H-16);
      const rollVals=gapData.map((_,i)=>{
        const sl=gapData.slice(Math.max(0,i-ROLLG+1),i+1);
        return sl.reduce((s,d)=>s+d.gap,0)/sl.length;
      });
      const rollPts=rollVals.map((v,i)=>px(i)+','+py(v)).join(' ');

      const buckets=[
        {label:'FL 🥇',min:-99,max:0.001},
        {label:'<0.5s',min:0,max:0.5},
        {label:'0.5–1s',min:0.5,max:1},
        {label:'1–1.5s',min:1,max:1.5},
        {label:'1.5–2s',min:1.5,max:2},
        {label:'2–3s',min:2,max:3},
        {label:'>3s',min:3,max:99},
      ].map(b=>({...b,count:gapData.filter(d=>d.gap>=b.min&&d.gap<b.max).length}));
      const bMax=Math.max(...buckets.map(b=>b.count),1);

      return div({class:'card'},
        div({style:{fontSize:'14px',fontWeight:'700',color:'#c9d1d9',marginBottom:'14px'}},t('fl_gap_title')),
        div({style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:'8px',marginBottom:'16px'}},
          div({style:{background:'#161b22',borderRadius:'8px',padding:'10px 12px'}},
            div({style:{fontSize:'10px',color:'#8b949e',fontWeight:'700',letterSpacing:'1px',marginBottom:'3px'}},t('avg_gap')),
            div({class:'mono',style:{fontSize:'22px',color:gapCol(avgGap)}},fmtGap(avgGap))
          ),
          div({style:{background:'#161b22',borderRadius:'8px',padding:'10px 12px'}},
            div({style:{fontSize:'10px',color:'#8b949e',fontWeight:'700',letterSpacing:'1px',marginBottom:'3px'}},t('best_gap')),
            div({class:'mono',style:{fontSize:'22px',color:gapCol(bestGap)}},fmtGap(bestGap))
          ),
          div({style:{background:'#161b22',borderRadius:'8px',padding:'10px 12px'}},
            div({style:{fontSize:'10px',color:'#8b949e',fontWeight:'700',letterSpacing:'1px',marginBottom:'3px'}},t('measurable')),
            div({class:'mono',style:{fontSize:'22px',color:'#c9d1d9'}},gapData.length+'/'+chartRaces.filter(r=>r.fastestLap).length),
            div({style:{fontSize:'10px',color:'#8b949e',marginTop:'2px'}},
              raceCount?raceCount+t('class_fl'):'',
              raceCount&&pbCount?' · ':'',
              pbCount?pbCount+t('pb_fallback'):''
            )
          )
        ),
        trendLen>=2?div({style:{marginBottom:'16px'}},
          div({style:{fontSize:'11px',color:'#8b949e',fontWeight:'700',letterSpacing:'1px',marginBottom:'6px'}},'TREND ('+t('trend_n_races').replace('{n}',ROLLG)+')'),
          h('svg',{width:'100%',height:String(H+20),viewBox:'0 0 '+W+' '+(H+20),style:{display:'block'}},
            h('line',{x1:'0',x2:String(W),y1:String(Math.max(4,Math.min(H-4,py(0)))),y2:String(Math.max(4,Math.min(H-4,py(0)))),stroke:'#30363d',strokeWidth:'1',strokeDasharray:'4 3'}),
            ...gapData.map((d,i)=>h('circle',{cx:String(px(i)),cy:String(py(d.gap)),r:'3',fill:gapCol(d.gap),opacity:'0.75'})),
            trendLen>=ROLLG?h('polyline',{points:rollPts,fill:'none',stroke:color,strokeWidth:'2',strokeLinejoin:'round',opacity:'0.9'}):null,
            h('text',{x:'2',y:String(H+16),fill:'#8b949e',fontSize:'9'},gapData[0].date.slice(0,7)),
            h('text',{x:String(W-2),y:String(H+16),fill:'#8b949e',fontSize:'9','text-anchor':'end'},gapData[gapData.length-1].date.slice(0,7))
          ),
          div({style:{display:'flex',gap:'16px',marginTop:'4px',fontSize:'11px',color:'#8b949e'}},
            h('span',{},h('span',{style:{color}},'── '),t('trend_n_races').replace('{n}',ROLLG)),
            h('span',{},'● ',h('span',{style:{color:'#ffd700'}},'FL'),', ',h('span',{style:{color:'#3fb950'}},'<0.5s'),', ',h('span',{style:{color:'#e3b341'}},'<1.5s'),', ',h('span',{style:{color:'#f85149'}},'>1.5s'))
          )
        ):null,
        div({},
          div({style:{fontSize:'11px',color:'#8b949e',fontWeight:'700',letterSpacing:'1px',marginBottom:'8px'}},t('distribution')),
          div({style:{display:'flex',gap:'4px',alignItems:'flex-end',height:'80px'}},
            ...buckets.map(b=>{
              const pct=b.count/bMax;
              const bc=b.max<=0.001?'#ffd700':b.max<=0.5?'#3fb950':b.max<=1.5?'#e3b341':'#f85149';
              return div({style:{flex:'1',display:'flex',flexDirection:'column',alignItems:'center',gap:'2px'}},
                div({style:{width:'100%',background:bc+'44',border:'1px solid '+bc+'66',borderRadius:'3px 3px 0 0',height:Math.max(2,pct*60)+'px',position:'relative'}},
                  b.count>0?div({style:{position:'absolute',top:'-16px',left:'50%',transform:'translateX(-50%)',fontSize:'10px',color:bc,fontWeight:'700',fontFamily:'monospace'}},b.count):null
                ),
                div({style:{fontSize:'9px',color:'#8b949e',marginTop:'2px',textAlign:'center',lineHeight:'1.2',whiteSpace:'nowrap'}},b.label)
              );
            })
          )
        )
      );
    })(),
    div({class:'card'},
      div({style:{fontSize:'14px',fontWeight:'700',color:'#c9d1d9',marginBottom:'14px'}},t('stat_tracks')),
      ...trackStats.map(tk=>{
        const isSelected = selTrack===tk.track;
        const avgInc = (tk.incSum/tk.count).toFixed(1);
        const incColor = parseFloat(avgInc)<=2?'#3fb950':parseFloat(avgInc)<=4?'#e3b341':'#f85149';
        return div({},
          div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderBottom: isSelected?'none':'1px solid #21262d',cursor:'pointer',borderRadius:isSelected?'8px 8px 0 0':'0',background:isSelected?color+'0d':'transparent',transition:'background .15s'},
            onClick:()=>{state['selTrack_'+label]=isSelected?null:tk.track;render();}},
            div({style:{display:'flex',alignItems:'center',gap:'10px'}},
              div({style:{fontSize:'13px',color:isSelected?color:'#c9d1d9',fontWeight:'600'}},tk.track),
              div({style:{fontSize:'11px',color:'#8b949e'}},tk.count+' '+t('races')+' · Ø P'+(tk.posSum/tk.count).toFixed(1)+' · Best P'+tk.best),
              div({style:{fontSize:'11px',color:incColor,fontFamily:'monospace'}},avgInc+'x Inc'),
              Object.keys(tk.cars).length===1&&tk.laps.length?div({style:{fontSize:'11px',color:'#e3b341'}},'⏱ '+tk.laps.sort()[0]):null
            ),
            div({style:{display:'flex',alignItems:'center',gap:'8px'}},
              div({class:'mono',style:{fontSize:'15px',color:tk.irSum>=0?'#3fb950':'#f85149'}},fmtD(tk.irSum)),
              div({style:{color:'#8b949e',fontSize:'12px',transition:'transform .15s',transform:isSelected?'rotate(180deg)':'rotate(0)'}},'▼')
            )
          ),
          isSelected ? renderTrackDetail(tk) : null
        );
      })
    )
  );
}
// ── RACES TAB ──
function renderRaces(){
  const {races,filter,search,sort} = state;

  // ── Empty state ──
  if(!races || races.length === 0){
    const jsonInpE=inp({type:'file',accept:'.json',multiple:true,style:{display:'none'}});
    jsonInpE.addEventListener('change',handleJSON);
    return div({style:{padding:'40px 20px',textAlign:'center',color:'#8b949e'}},
      div({style:{fontSize:'56px',marginBottom:'16px'}},'🏁'),
      div({style:{fontSize:'22px',fontWeight:'900',color:'#c9d1d9',marginBottom:'8px'}},t('empty_title')),
      div({style:{fontSize:'14px',lineHeight:'1.8',maxWidth:'440px',margin:'0 auto 28px'}},t('empty_hint')),
      div({style:{display:'flex',gap:'12px',justifyContent:'center',flexWrap:'wrap'}},
        btn({class:'btn',style:{background:'#238636',borderRadius:'8px',fontSize:'14px',padding:'12px 24px'},onClick:()=>openRaceForm(null)},t('add_race')),
        h('label',{class:'btn',style:{background:'#1f6feb',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:'8px',borderRadius:'8px',padding:'12px 24px',fontSize:'14px',fontWeight:'700',color:'#fff'}},'📂 '+t('btn_data_import'),jsonInpE),
        btn({class:'btn',style:{background:'#6e40c9',borderRadius:'8px',fontSize:'14px',padding:'12px 24px'},onClick:()=>loadDemoData()},t('load_demo'))
      )
    );
  }

  // ── Demo data warning banner ──
  const demoRaces = races.filter(r => r.id && r.id.startsWith('d-'));
  const realRaces = races.filter(r => !r.id || !r.id.startsWith('d-'));
  const demoBanner = demoRaces.length > 0 && realRaces.length > 0
    ? div({style:{
        display:'flex', alignItems:'center', justifyContent:'space-between',
        gap:'12px', flexWrap:'wrap',
        padding:'10px 16px', marginBottom:'12px',
        background:'#e3b34115', border:'1px solid #e3b34155',
        borderRadius:'10px', fontSize:'13px'
      }},
        div({style:{display:'flex',alignItems:'center',gap:'8px',color:'#e3b341'}},
          span({},'⚠️'),
          span({},state.lang==='es'
            ? `Datos demo activos (${demoRaces.length} carreras) — tus carreras reales ya están importadas.`
            : `Demo data active (${demoRaces.length} races) — your real races are already imported.`)
        ),
        btn({class:'btn', style:{background:'#e3b341', color:'#000', fontSize:'12px', padding:'6px 14px', borderRadius:'8px', fontWeight:'700', flexShrink:'0'},
          onClick:()=>{
            const msg = state.lang==='es'
              ? `¿Eliminar ${demoRaces.length} carreras demo? Tus ${realRaces.length} carreras reales se conservarán.`
              : `Remove ${demoRaces.length} demo races? Your ${realRaces.length} real races will be kept.`;
            if(confirm(msg)){
              updateRaces(realRaces);
              const allOpps = loadOpponents();
              const cleanedOpps = allOpps.map(o => ({
                ...o,
                encounters: (o.encounters||[]).filter(e => !e.raceId.startsWith('d-'))
              })).filter(o => o.encounters.length > 0);
              saveOpponents(cleanedOpps);
              render();
            }
          }
        }, t('remove_demo'))
      )
    : null;


  let filtered = races;
  if(filter!=='all') filtered=filtered.filter(r=>r.category===filter);
  if(state.seasonFilter) filtered=filtered.filter(r=>(r.seasonYear&&r.seasonQuarter)?(r.seasonYear+'S'+r.seasonQuarter===state.seasonFilter):false);
  if(search) filtered=filtered.filter(r=>(r.track||'').toLowerCase().includes(search.toLowerCase())||(r.notes||'').toLowerCase().includes(search.toLowerCase()));
  if(sort==='date_desc') filtered=[...filtered].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  if(sort==='date_asc')  filtered=[...filtered].sort((a,b)=>a.date.localeCompare(b.date)||a.id.localeCompare(b.id));
  if(sort==='pos')       filtered=[...filtered].sort((a,b)=>a.pos-b.pos);
  if(sort==='ir_gain')   filtered=[...filtered].sort((a,b)=>iRDelta(b)-iRDelta(a));

  const RACES_PER_PAGE=20;
  if(!state.racesPage) state.racesPage=1;
  const totalPages=Math.max(1,Math.ceil(filtered.length/RACES_PER_PAGE));
  if(state.racesPage>totalPages) state.racesPage=totalPages;
  const racesPage=state.racesPage;
  const pagedFiltered=filtered.slice((racesPage-1)*RACES_PER_PAGE, racesPage*RACES_PER_PAGE);

  const totalIR=filtered.reduce((s,r)=>s+iRDelta(r),0);
  const avgPosF=filtered.length>0?(filtered.reduce((s,r)=>s+r.pos,0)/filtered.length).toFixed(1):'–';

  const searchInp=inp({type:'text',placeholder:t('search_placeholder'),'data-focus-key':'race-search',value:search,style:{flex:'1',minWidth:'180px'}});
  searchInp.addEventListener('input',e=>setState({search:e.target.value,racesPage:1}));

  // Dynamic category filter — only show categories that have races
  const activeCats=Object.keys(CATEGORIES).filter(c=>races.some(r=>r.category===c));
  const filterBtns=[['all',t('all')],...activeCats.map(c=>[c,catEmoji(c)+' '+catLabel(c)])].map(([v,l])=>
    btn({class:'btn-outline',style:{color:filter===v?'#58a6ff':'#8b949e',border:`1px solid ${filter===v?'#58a6ff':'#30363d'}`,padding:'9px 14px',background:filter===v?'#58a6ff11':'transparent',borderRadius:'8px'},onClick:()=>setState({filter:v,racesPage:1})},l)
  );

  const sortSel=h('select',{style:{background:'#0d1117',color:'#c9d1d9',border:'1px solid #30363d',borderRadius:'8px',padding:'10px 14px',fontFamily:"'Courier New',monospace",fontSize:'14px',cursor:'pointer'}},
    h('option',{value:'date_desc'},t('sort_newest')),
    h('option',{value:'date_asc'},t('sort_oldest')),
    h('option',{value:'pos'},t('sort_pos')),
    h('option',{value:'ir_gain'},t('sort_ir'))
  );
  sortSel.value=sort;
  sortSel.addEventListener('change',e=>setState({sort:e.target.value,racesPage:1}));

  // ── Season filter ──
  const seasons=[...new Set((races||[]).filter(r=>r.seasonYear&&r.seasonQuarter).map(r=>r.seasonYear+'S'+r.seasonQuarter))].sort().reverse();
  const activeSeason=state.seasonFilter||'';
  const seasonSel=seasons.length>0?h('select',{style:{background:'#0d1117',color:activeSeason?'#58a6ff':'#8b949e',border:'1px solid '+(activeSeason?'#58a6ff':'#30363d'),borderRadius:'8px',padding:'10px 14px',fontFamily:"'Courier New',monospace",fontSize:'14px',cursor:'pointer'}},
    h('option',{value:''},t('all_seasons')),
    ...seasons.map(s=>h('option',{value:s},s.replace('S',' S')))
  ):null;
  if(seasonSel){
    seasonSel.value=activeSeason;
    seasonSel.addEventListener('change',e=>setState({seasonFilter:e.target.value,racesPage:1}));
  }

  const jsonInp=inp({type:'file',accept:'.json',multiple:true,style:{display:'none'}});
  jsonInp.addEventListener('change',handleJSON);
  const jsonLbl=h('label',{class:'btn',style:{background:'#1f6feb',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:'6px',borderRadius:'8px',padding:'10px 18px',fontSize:'13px',fontWeight:'700',color:'#fff'}},'📂 '+t('btn_data_import'),jsonInp);

  const batchBtn=btn({class:'btn',style:{background:'#8957e5',borderRadius:'8px'},onClick:()=>setState({modal:{type:'batchUpload'}})},
    '📦 '+t('batch_btn_label')
  );

  const addBtn=btn({class:'btn',style:{background:'#238636',borderRadius:'8px'},onClick:()=>openRaceForm(null)},t('add_race'));

  const summary=div({style:{display:'flex',gap:'16px',padding:'10px 16px',background:'#0d1117',borderRadius:'8px',marginBottom:'16px',fontSize:'13px',color:'#8b949e',flexWrap:'wrap'}},
    span({},span({style:{color:'#c9d1d9',fontWeight:'700'}},filtered.length.toString()),' '+t('races')),
    span({},'Ø P',span({style:{color:'#c9d1d9',fontWeight:'700'}},avgPosF.toString())),
    span({},span({style:{color:totalIR>=0?'#3fb950':'#f85149',fontWeight:'700'}},fmtD(totalIR)),' '+t('ir_total')),
    span({},span({style:{color:'#3fb950',fontWeight:'700'}},filtered.filter(r=>r.inc===0).length.toString()),' '+t('clean_races'))
  );

  const raceCards=pagedFiltered.map(r=>{
    const delta=iRDelta(r);
    const col=catColor(r.category);
    const comeback=r.startPos-r.pos;
    const card=div({class:'card race-card',style:{display:'flex',alignItems:'center',gap:'16px',cursor:'pointer',marginBottom:'10px'}},
      div({style:{minWidth:'56px',textAlign:'center'}},
        div({class:'mono',style:{fontSize:'28px',color:posColor(r.classPos||r.pos),lineHeight:'1'}},'P'+(r.classPos||r.pos)),
        div({style:{fontSize:'10px',color:'#8b949e'}},t('from_pos')+r.startPos)
      ),
      div({style:{flex:'1',minWidth:'0'}},
        div({style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px',flexWrap:'wrap'}},
          span({style:{fontSize:'10px',color:col,border:`1px solid ${col}33`,borderRadius:'4px',padding:'2px 7px',fontWeight:'700'}},catEmoji(r.category)+' '+catLabel(r.category)),
          span({style:{fontSize:'11px',color:'#8b949e'}},(r.date||'').slice(0,10)),
          (r.seasonYear&&r.seasonQuarter)?span({style:{fontSize:'10px',color:'#8b949e',background:'#8b949e11',border:'1px solid #30363d',borderRadius:'4px',padding:'2px 6px'}},(r.seasonYear%100)+'S'+r.seasonQuarter+(r.raceWeek?' W'+r.raceWeek:'')):null,
          r.wetRace?span({style:{fontSize:'10px',color:'#58a6ff',background:'#58a6ff11',border:'1px solid #58a6ff44',borderRadius:'4px',padding:'2px 6px'}},t('wet_race_label')):null,
          r.inc===0?span({style:{fontSize:'10px',color:'#3fb950',background:'#3fb95022',borderRadius:'4px',padding:'2px 6px'}},'✓ 0x'):null,
          r.inc>=8?span({style:{fontSize:'10px',color:'#f85149',background:'#f8514922',borderRadius:'4px',padding:'2px 6px'}},'⚠️ '+r.inc+'x'):null,
          (r.inc>0&&r.inc<8)?span({style:{fontSize:'10px',color:'#e3b341',background:'#e3b34122',borderRadius:'4px',padding:'2px 6px'}},r.inc+'x Inc'):null
        ),
        div({style:{fontSize:'15px',fontWeight:'700',color:'#c9d1d9',marginBottom:'3px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},r.track),
        div({style:{fontSize:'12px',color:'#8b949e'}},'SoF '+r.sof+' · '+r.car),
        comeback>3?div({style:{fontSize:'11px',color:'#f0883e',marginTop:'3px'}},'🚀 +'+comeback+' '+t('places_gained')):null,
        r.dnf==='external'?div({style:{fontSize:'11px',color:'#f0883e',marginTop:'3px'}},t('dnf_external')):null,
        r.dnf==='self'?div({style:{fontSize:'11px',color:'#f85149',marginTop:'3px'}},t('dnf_self')):null
      ),
      div({style:{textAlign:'right',flexShrink:'0'}},
        div({class:'mono',style:{fontSize:'20px',color:delta>0?'#3fb950':delta<0?'#f85149':'#8b949e'}},fmtD(delta)),
        div({style:{fontSize:'11px',color:'#8b949e'}},r.iRatingAfter+' iR'),
        r.fastestLap?div({style:{fontSize:'10px',color:'#bc8cff',marginTop:'2px'}},'⚡ FL '+r.fastestLap):null
      )
    );
    card.addEventListener('click',()=>openRaceDetail(r));
    card.addEventListener('mouseenter',()=>card.style.borderColor=col+'66');
    card.addEventListener('mouseleave',()=>card.style.borderColor='#21262d');
    return card;
  });

  const pagination=totalPages>1?div({style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'12px',marginTop:'16px',paddingTop:'12px',borderTop:'1px solid #21262d'}},
    btn({style:{background:'transparent',border:'1px solid #30363d',color:racesPage>1?'#c9d1d9':'#484f58',borderRadius:'8px',padding:'8px 14px',cursor:racesPage>1?'pointer':'default',fontSize:'16px'},onClick:()=>{if(racesPage>1)setState({racesPage:racesPage-1})}},'◀'),
    span({style:{color:'#8b949e',fontSize:'13px',minWidth:'80px',textAlign:'center'}},t('page')+racesPage+t('of')+totalPages),
    btn({style:{background:'transparent',border:'1px solid #30363d',color:racesPage<totalPages?'#c9d1d9':'#484f58',borderRadius:'8px',padding:'8px 14px',cursor:racesPage<totalPages?'pointer':'default',fontSize:'16px'},onClick:()=>{if(racesPage<totalPages)setState({racesPage:racesPage+1})}},'▶')
  ):null;

  return div({style:{padding:'20px'}},
    demoBanner,
    div({style:{display:'flex',gap:'10px',marginBottom:'16px',flexWrap:'wrap',alignItems:'center'}},
      searchInp, div({style:{display:'flex',gap:'6px',flexWrap:'wrap'}},...filterBtns), sortSel, seasonSel||null, addBtn, jsonLbl, batchBtn
    ),
    summary,
    div({},...raceCards),
    pagination
  );
}

// ── Opponents storage helpers ──
const OPP_KEY = 'iracing-v3-opponents';
function loadOpponents(){return loadLS(OPP_KEY,[]);}
function saveOpponents(data){saveLS(OPP_KEY,data);}
// ── DRIVER TAGS ──
const DRIVER_TAGS = [
  {id:'dirty',   emoji:'😈', label:'Dirty',     color:'#f85149'},
  {id:'fast',    emoji:'⚡', label:'Fast',       color:'#ffd700'},
  {id:'clean',   emoji:'✓',  label:'Clean',      color:'#3fb950'},
  {id:'rival',   emoji:'🔁', label:'Rival',      color:'#58a6ff'},
  {id:'friendly',emoji:'🤝', label:'Friendly',   color:'#3fb950'},
  {id:'blocker', emoji:'🚧', label:'Blocker',    color:'#f0883e'},
];

function renderOpponents(){
  const opponents=loadOpponents();
  const {races}=state;
  const oppSearch=state.oppSearch||'';
  const oppSort=state.oppSort||'encounters';
  const oppCat=state.oppCat||'all';
  const oppPage=state.oppPage||0;
  const OPP_PER_PAGE=20;

  // Exclude self from opponent list
  const cfg=loadConfig();
  const myCustId=String(cfg.myCustId||loadLS('iracing-v3-custid','')||'');
  const myNameLower=(cfg.myName||'').toLowerCase().trim();
  const isMe=(d)=>(myCustId&&d.iracingId===myCustId)||(myNameLower&&d.name.toLowerCase().trim()===myNameLower);

  const withStats=opponents.filter(d=>!isMe(d)).map(d=>{
    const enc=d.encounters||[];
    const cutoff=new Date(Date.now()-14*24*60*60*1000).toISOString().slice(0,10);
    const recentEnc=enc.filter(e=>e.date>=cutoff);
    const formula=recentEnc.filter(e=>e.category==='formula');
    const road=recentEnc.filter(e=>e.category==='road');
    const oval=recentEnc.filter(e=>e.category==='oval');
    const dirt=recentEnc.filter(e=>e.category==='dirt_road'||e.category==='dirt_oval');
    // Cross-racer: use ALL encounters, not just recent
    const allFormula=enc.filter(e=>e.category==='formula');
    const allRoad=enc.filter(e=>e.category==='road');
    const both=allFormula.length>0&&allRoad.length>0;
    const avgPos=recentEnc.length?recentEnc.reduce((s,e)=>s+e.pos,0)/recentEnc.length:0;
    const avgInc=recentEnc.length?recentEnc.reduce((s,e)=>s+e.inc,0)/recentEnc.length:0;
    const wins=recentEnc.filter(e=>e.pos===1).length;
    const cleanRaces=recentEnc.filter(e=>e.inc===0).length;
    const tracks=[...new Set(recentEnc.map(e=>e.track))];
    const maxIR=Math.max(...recentEnc.map(e=>Math.max(e.iRBefore||0,e.iRAfter||0)),d.peakIR||0);
    const lastSeen=recentEnc.length?recentEnc.slice().sort((a,b)=>b.date.localeCompare(a.date))[0].date:'';
    const cutoff3d=new Date(Date.now()-3*24*60*60*1000).toISOString().slice(0,10);
    const recentlyMet=enc.some(e=>e.date>=cutoff3d);
    return {...d,enc,formula,road,oval,dirt,both,avgPos,avgInc,wins,cleanRaces,tracks,maxIR,lastSeen,totalEnc:enc.length,recentEnc:recentEnc.length,recentlyMet};
  });

  let filtered=withStats.filter(d=>{
    if(oppSearch&&!d.name.toLowerCase().includes(oppSearch.toLowerCase())&&!d.iracingId.includes(oppSearch)) return false;
    if(oppCat==='formula'&&d.formula.length===0) return false;
    if(oppCat==='road'&&d.road.length===0) return false;
    if(oppCat==='oval'&&d.oval.length===0) return false;
    if(oppCat==='cross'&&!d.both) return false;
    return d.totalEnc>0;
  });

  if(oppSort==='encounters') filtered.sort((a,b)=>b.totalEnc-a.totalEnc);
  else if(oppSort==='ir') filtered.sort((a,b)=>b.maxIR-a.maxIR);
  else if(oppSort==='avgpos') filtered.sort((a,b)=>a.avgPos-b.avgPos);
  else if(oppSort==='incidents') filtered.sort((a,b)=>b.avgInc-a.avgInc);
  else if(oppSort==='lastSeen') filtered.sort((a,b)=>b.lastSeen.localeCompare(a.lastSeen));

  const crossRacers=withStats.filter(d=>d.both);
  const totalOpponents=withStats.length;
  const top10IR=withStats.filter(d=>d.maxIR>0).sort((a,b)=>b.maxIR-a.maxIR).slice(0,5);
  const mostMet=[...withStats].sort((a,b)=>b.totalEnc-a.totalEnc).slice(0,3);

  const nemeses=withStats.map(d=>{
    let theyAhead=0,nemTotal=0;
    d.enc.forEach(e=>{
      const myRace=races.find(r=>r.id===e.raceId);
      if(!myRace) return;
      nemTotal++;
      if(e.pos<myRace.pos) theyAhead++;
    });
    return {...d,nemTheyAhead:theyAhead,nemTotal,nemScore:nemTotal>=3?theyAhead/nemTotal:0};
  }).filter(d=>d.nemTotal>=3&&d.nemScore>0.5).sort((a,b)=>b.nemScore-a.nemScore).slice(0,5);

  if(opponents.length===0){
    return div({style:{padding:'40px',textAlign:'center',color:'#8b949e'}},
      div({style:{fontSize:'48px',marginBottom:'16px'}},'👥'),
      div({style:{fontSize:'18px',fontWeight:'900',color:'#c9d1d9',marginBottom:'8px'}},t('no_opp_data')),
      div({style:{fontSize:'14px',lineHeight:'1.7'}},t('opp_import_hint'))
    );
  }

  const heroStats=div({style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:'10px',marginBottom:'16px'}},
    ...[
      ['👥',t('total_opponents'),totalOpponents,'#c9d1d9'],
      ['🔀',t('cross_racers'),crossRacers.length,'#bc8cff'],
      ['🏆',t('highest_ir_opp'),top10IR[0]?top10IR[0].maxIR+'':'-','#ffd700'],
      ['🔁',t('most_frequent_opp'),mostMet[0]?mostMet[0].totalEnc+'x '+mostMet[0].name.split(' ')[0]:'-','#58a6ff'],
    ].map(([ic,lbl,val,col])=>div({class:'card',style:{display:'flex',flexDirection:'column',gap:'4px'}},
      div({style:{fontSize:'11px',color:'#8b949e',letterSpacing:'1px',textTransform:'uppercase',fontWeight:'700'}},ic+' '+lbl),
      div({class:'mono',style:{fontSize:'18px',color:col,lineHeight:'1.1',wordBreak:'break-word'}},val.toString())
    ))
  );

  const topPanel=div({style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'12px',marginBottom:'16px'}},
    div({class:'card'},
      div({style:{fontSize:'12px',color:'#ffd700',fontWeight:'900',letterSpacing:'1px',marginBottom:'10px'}},t('highest_ir_panel')),
      ...top10IR.slice(0,5).map((d,i)=>div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid #21262d'}},
        div({style:{display:'flex',alignItems:'center',gap:'8px'}},
          span({style:{fontSize:'11px',color:'#8b949e',minWidth:'16px'}},(i+1)+'.'),
          div({},
            div({style:{fontSize:'13px',fontWeight:'700',color:'#c9d1d9'}},d.name.split(' ').slice(0,2).join(' '),(isTeammate(d.name)?' 🤝':'')),
            div({style:{fontSize:'10px',color:'#8b949e'}},d.totalEnc+'x · '+(d.both?'🔀 Cross':''))
          )
        ),
        div({class:'mono',style:{fontSize:'16px',color:'#ffd700'}},d.maxIR)
      ))
    ),
    div({class:'card'},
      div({style:{fontSize:'12px',color:'#58a6ff',fontWeight:'900',letterSpacing:'1px',marginBottom:'10px'}},t('most_met_panel')),
      ...(()=>{
        const sorted=withStats.slice().sort((a,b)=>b.totalEnc-a.totalEnc).slice(0,5);
        const maxEnc=sorted[0]?.totalEnc||1;
        return sorted.map((d,i)=>{
          const barW=Math.round((d.totalEnc/maxEnc)*100);
          return div({style:{marginBottom:'8px'}},
            div({style:{display:'flex',justifyContent:'space-between',fontSize:'12px',marginBottom:'3px'}},
              span({style:{color:'#c9d1d9',fontWeight:'700'}},d.name.split(' ').slice(0,2).join(' '),(isTeammate(d.name)?' 🤝':'')),
              span({style:{color:'#58a6ff',fontWeight:'900'}},d.totalEnc+'x')
            ),
            div({style:{background:'#21262d',borderRadius:'4px',height:'6px'}},
              div({style:{width:barW+'%',background:'#58a6ff',borderRadius:'4px',height:'6px'}})
            )
          );
        });
      })()
    ),
    div({class:'card'},
      div({style:{fontSize:'12px',color:'#bc8cff',fontWeight:'900',letterSpacing:'1px',marginBottom:'10px'}},'🔀 CROSS-RACER'),
      crossRacers.length===0?div({style:{color:'#8b949e',fontSize:'13px'}},t('cross_none')):null,
      ...crossRacers.sort((a,b)=>b.totalEnc-a.totalEnc).slice(0,5).map(d=>div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid #21262d'}},
        div({},
          div({style:{fontSize:'13px',fontWeight:'700',color:'#c9d1d9'}},d.name.split(' ').slice(0,2).join(' '),(isTeammate(d.name)?' 🤝':'')),
          div({style:{display:'flex',gap:'6px',marginTop:'2px'}},
            span({style:{fontSize:'10px',color:'#58a6ff',background:'#58a6ff22',borderRadius:'4px',padding:'1px 6px'}},'🔵 '+d.formula.length+'x'),
            span({style:{fontSize:'10px',color:'#3fb950',background:'#3fb95022',borderRadius:'4px',padding:'1px 6px'}},'🟢 '+d.road.length+'x')
          )
        ),
        div({class:'mono',style:{fontSize:'14px',color:'#bc8cff'}},d.totalEnc+'x')
      ))
    )
  );

  const nemesisPanel=nemeses.length>0?div({class:'card',style:{marginBottom:'16px',borderColor:'#f8514944'}},
    div({style:{fontSize:'12px',color:'#f85149',fontWeight:'700',letterSpacing:'1px',marginBottom:'12px'}},t('nemesis_full')),
    div({style:{display:'flex',flexDirection:'column',gap:'4px'}},
      ...nemeses.map((d,i)=>{
        const pct=Math.round(d.nemScore*100);
        return div({style:{display:'flex',alignItems:'center',gap:'10px',padding:'6px 0',borderBottom:'1px solid #21262d44'}},
          span({style:{fontSize:'11px',color:'#8b949e',minWidth:'16px'}},(i+1)+'.'),
          div({style:{flex:'1'}},
            div({style:{display:'flex',justifyContent:'space-between',fontSize:'12px',marginBottom:'3px'}},
              span({style:{color:'#c9d1d9',fontWeight:'700'}},d.name.split(' ').slice(0,2).join(' '),(isTeammate(d.name)?' 🤝':'')),
              span({style:{color:'#f85149',fontWeight:'900'}},d.nemTheyAhead+'×/'+d.nemTotal+' ('+pct+'%)')
            ),

// ── Lap time helpers ──
function iRLapToStr(raw){
  if(!raw||raw===0) return null;
  const s=raw/10000;
  const m=Math.floor(s/60);
  return m+':'+(s-m*60).toFixed(3).padStart(6,'0');
}

// ── License category mapping (iRacing API → internal) ──
const LICENSE_CAT_MAP = {
  'formula_car': 'formula',
  'sports_car':  'road',
  'road':        'road',
  'oval':        'oval',
  'dirt_oval':   'dirt_oval',
  'dirt_road':   'dirt_road',
};
function mapLicenseCategory(raw){
  if(!raw) return 'road';
  const key=raw.toLowerCase().replace(/[\s-]+/g,'_');
  return LICENSE_CAT_MAP[key]||key;
}

// ── JSON PARSER (phase 1: extract metadata + driver list) ──
function parseJSONMeta(jsonText){
  let raw=JSON.parse(jsonText);
  // Unwrap event_result / event_data wrappers (iRacing API format)
  if(raw.data && (raw.type==='event_result'||raw.data.subsession_id!=null)) raw=raw.data;

  const data=raw;
  const results=data.session_results||data.results||[];
  let raceSession=null;
  if(Array.isArray(results)){
    raceSession=results.find(s=>(s.simsession_type_name||'').toLowerCase().includes('race')||s.simsession_type===6);
  }
  if(!raceSession) throw new Error('No race session found in JSON');
  const allResults=raceSession.results||[];
  if(!allResults.length) throw new Error('No results in race session');

  // Track: can be an object {track_name, config_name} or a flat string
  let trackName='Unknown Track';
  if(data.track && typeof data.track==='object'){
    trackName=data.track.track_name||'Unknown Track';
    if(data.track.config_name) trackName+=' '+data.track.config_name;
  } else {
    trackName=data.track?.track_name||data.track_name||data.track||'Unknown Track';
  }
  const track=String(trackName).trim();

  const category=mapLicenseCategory(data.license_category||data.series_license_category||'road');
  const sof=Math.round(data.event_strength_of_field||data.strength_of_field||
    (data.car_classes&&data.car_classes[0]?.strength_of_field)||0);
  const seriesName=data.series_name||'';
  const seasonYear=data.season_year||null;
  const seasonQuarter=data.season_quarter||null;
  const raceWeek=typeof data.race_week_num==='number'?data.race_week_num+1:null;
  const raceId='j'+(data.subsession_id||data.session_id||Date.now());
  const dateRaw=data.start_time||data.end_time||new Date().toISOString();
  const date=dateRaw.replace(' ','T').slice(0,16);

  // Weather detection
  const wx=data.weather||{};
  const wxType=wx.type||data.weather_type||0;
  const wxTemp=wx.temp_value||data.temp_value||25;
  const precip=(wx.precip_time_pct||0)>0||(wx.precip_option||0)>0;
  const wetRace=!!(wxType>0&&(wxTemp<15||precip));

  return {data, allResults, track, category, sof, seriesName, seasonYear, seasonQuarter, raceWeek, raceId, date, wetRace};
}

// ── JSON PARSER (phase 2: build preview from a specific driver row) ──
function buildPreviewFromRow(myRow, meta){
  const {track, category, sof, seriesName, seasonYear, seasonQuarter, raceWeek, raceId, date, wetRace}=meta;

  const iRBefore=myRow.oldi_rating||0;
  const iRAfter=myRow.newi_rating||0;
  const srBefore=myRow.old_sub_level!=null?myRow.old_sub_level/100:null;
  const srAfter=myRow.new_sub_level!=null?myRow.new_sub_level/100:null;
  const finPos=myRow.finish_position!=null?myRow.finish_position+1:myRow.position||1;
  const classPos=myRow.finish_position_in_class!=null?myRow.finish_position_in_class+1:finPos;
  const startPos=(myRow.starting_position!=null?myRow.starting_position+1:0)||1;
  const inc=myRow.incidents||0;
  const car=(myRow.car_name||myRow.car_class_name||'Unknown Car').trim();
  const fl=iRLapToStr(myRow.best_lap_time);
  const al=iRLapToStr(myRow.average_lap);

  // DNF detection
  let dnf=null;
  if(myRow.reason_out_id>0){
    const selfReasons=[29,30,32];
    dnf=selfReasons.includes(myRow.reason_out_id)?'self':'external';
  }

  return {
    id:raceId, date, track, car, category, sof,
    pos:finPos, classPos, startPos, inc,
    iRatingBefore:iRBefore, iRatingAfter:iRAfter,
    srBefore, srAfter,
    fastestLap:fl, averageLap:al,
    notes:seriesName?seriesName:'',
    wetRace, seasonYear, seasonQuarter, raceWeek,
    dnf,
  };
}

// ── Combined parser (auto-selects driver if custId known or by name) ──
function parseOneJSON(jsonText){
  const meta=parseJSONMeta(jsonText);
  const {allResults}=meta;
  const cfg=loadConfig();

  // 1. Try by saved custId (from config or legacy key)
  const savedCustId=cfg.myCustId||loadLS('iracing-v3-custid',null);
  let myRow=null;
  if(savedCustId) myRow=allResults.find(r=>String(r.cust_id)===String(savedCustId));

  // 2. Try by configured display name
  if(!myRow && cfg.myName){
    const myNameLower=cfg.myName.toLowerCase().trim();
    myRow=allResults.find(r=>(r.display_name||'').toLowerCase().trim()===myNameLower);
  }

  // 3. Fallback: first entry with a name
  if(!myRow) myRow=allResults.find(r=>r.display_name&&r.cust_id);
  if(!myRow) throw new Error('Driver not found in results');

  // Persist custId for future imports
  if(myRow.cust_id){
    saveCustId(myRow.cust_id);
    if(!cfg.myCustId){ cfg.myCustId=String(myRow.cust_id); saveConfig(cfg); }
    if(!cfg.myName && myRow.display_name){ cfg.myName=myRow.display_name.trim(); saveConfig(cfg); }
  }

  const preview=buildPreviewFromRow(myRow, meta);
  return {preview, allResults:meta.allResults, track:meta.track, category:meta.category, sof:meta.sof};
}

// ── Check if driver identity is known ──
function hasSavedCustId(){
  const cfg=loadConfig();
  return !!(cfg.myCustId || cfg.myName || loadLS('iracing-v3-custid',null));
}
function saveCustId(id){ try{localStorage.setItem('iracing-v3-custid',String(id));}catch(e){} }

// ── Merge opponents from JSON ──
function mergeOpponentsFromJSON(raceId, date, track, category, sof, allResults){
  const existing=loadOpponents();
  const map={};
  existing.forEach(d=>{map[d.iracingId]=d;});
  // Get my own custId to exclude myself from opponents
  const cfg=loadConfig();
  const myCustId=String(cfg.myCustId||loadLS('iracing-v3-custid','')||'');
  allResults.forEach(row=>{
    const custId=String(row.cust_id||'');
    if(!custId||custId==='0') return;
    if(custId===myCustId) return; // skip self
    const name=(row.display_name||'').trim();
    if(!name) return;
    const finPos=(row.finish_position!=null?row.finish_position+1:0)||0;
    const startPos=(row.starting_position!=null?row.starting_position+1:0)||0;
    const inc=row.incidents||0;
    const iRBefore=row.oldi_rating||0;
    const iRAfter=row.newi_rating||0;
    const fl=iRLapToStr(row.best_lap_time);
    const status=row.reason_out||'Running';
    if(!map[custId]){
      map[custId]={iracingId:custId,name,encounters:[],tags:[],notes:'',peakIR:iRBefore,currentIR:iRAfter};
    }
    const d=map[custId];
    if(!d.encounters.find(e=>e.raceId===raceId)){
      d.encounters.push({raceId,date,track,category,sof,pos:finPos,startPos,inc,iRBefore,iRAfter,fl,status});
    }
    d.peakIR=Math.max(d.peakIR||0,iRBefore,iRAfter);
    d.currentIR=iRAfter;
    if(name&&name!==d.name) d.name=name;
  });
  const merged=Object.values(map);
  saveOpponents(merged);
  return merged.length;
}

// ── Batch JSON import ──
function handleJSONBatch(files){
  let newRaces=0,srPatched=0,seasonPatched=0,skipped=0;
  const errors=[];
  let done=0;
  Array.from(files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const {preview,allResults,track,category,sof}=parseOneJSON(ev.target.result);
        const existing=state.races.find(r=>r.id===preview.id);
        if(existing){
          let patch={};
          if(existing.srAfter===null&&preview.srAfter!==null) patch={...patch,srBefore:preview.srBefore,srAfter:preview.srAfter};
          if(existing.seasonYear==null&&preview.seasonYear!=null) patch={...patch,seasonYear:preview.seasonYear,seasonQuarter:preview.seasonQuarter,raceWeek:preview.raceWeek};
          if(Object.keys(patch).length>0){
            updateRaces(state.races.map(r=>r.id===preview.id?{...r,...patch}:r));
            if(patch.srAfter) srPatched++;
            if(patch.seasonYear) seasonPatched++;
          } else { skipped++; }
          mergeOpponentsFromJSON(preview.id,preview.date,track,category,sof,allResults);
        } else {
          mergeOpponentsFromJSON(preview.id,preview.date,track,category,sof,allResults);
          editRace(preview);
          newRaces++;
        }
      }catch(err){ errors.push(file.name+': '+err.message); }
      done++;
      if(done===files.length){
        setState({modal:{type:'batchSummary',newRaces,srPatched,seasonPatched,skipped,errors,fileCount:files.length}});
      }
    };
    reader.readAsText(file);
  });
}

// ── Single JSON handler ──
function handleJSON(e){
  const files=Array.from(e.target.files); if(!files.length) return; e.target.value='';
  if(files.length>1){ handleJSONBatch(files); return; }
  const file=files[0];
  const reader=new FileReader();
  reader.onload=(ev)=>{
    try{
      const jsonText=ev.target.result;
      // If we don't know who the user is yet, show driver picker first
      if(!hasSavedCustId()){
        const meta=parseJSONMeta(jsonText);
        const drivers=meta.allResults
          .filter(r=>r.display_name&&r.cust_id)
          .sort((a,b)=>(a.finish_position||99)-(b.finish_position||99));
        if(!drivers.length) throw new Error('No drivers found in results');
        setState({modal:{type:'driverPicker', drivers, jsonText, meta}});
        return;
      }
      const {preview,allResults,track,category,sof}=parseOneJSON(jsonText);
      const alreadyExists=state.races.find(r=>r.id===preview.id);
      if(alreadyExists){
        let patch={};
        if(alreadyExists.srAfter===null&&preview.srAfter!==null) patch={...patch,srBefore:preview.srBefore,srAfter:preview.srAfter};
        if(alreadyExists.seasonYear==null&&preview.seasonYear!=null) patch={...patch,seasonYear:preview.seasonYear,seasonQuarter:preview.seasonQuarter,raceWeek:preview.raceWeek};
        if(Object.keys(patch).length>0){
          updateRaces(state.races.map(r=>r.id===preview.id?{...r,...patch}:r));
          mergeOpponentsFromJSON(preview.id,preview.date,track,category,sof,allResults);
          const parts=[];
          if(patch.srAfter) parts.push('SR: '+preview.srBefore+' → '+preview.srAfter);
          if(patch.seasonYear) parts.push('Season: '+preview.seasonYear+' S'+preview.seasonQuarter+(preview.raceWeek?' W'+preview.raceWeek:''));
          alert('✅ Patched: '+preview.track+'\n'+parts.join(' | '));
          return;
        }
        setState({modal:{type:'jsonDuplicate',preview,allResults}});
        return;
      }
      mergeOpponentsFromJSON(preview.id,preview.date,track,category,sof,allResults);
      openCSVPreview(preview);
    }catch(err){alert('JSON '+t('import_error')+err.message);}
  };
  reader.readAsText(file);
}

// ── Driver picker: user selects themselves from the result list ──
function handleDriverPicked(custId, jsonText, meta){
  saveCustId(custId);
  // Also save to config
  const myRow=meta.allResults.find(r=>String(r.cust_id)===String(custId));
  const cfg=loadConfig();
  cfg.myCustId=String(custId);
  if(myRow&&myRow.display_name&&!cfg.myName) cfg.myName=myRow.display_name.trim();
  saveConfig(cfg);

  closeModal();
  try{
    if(!myRow) throw new Error('Driver not found');
    const preview=buildPreviewFromRow(myRow, meta);
    const alreadyExists=state.races.find(r=>r.id===preview.id);
    if(alreadyExists){
      setState({modal:{type:'jsonDuplicate',preview,allResults:meta.allResults}});
      return;
    }
    mergeOpponentsFromJSON(preview.id,preview.date,meta.track,meta.category,meta.sof,meta.allResults);
    openCSVPreview(preview);
  }catch(err){alert('JSON '+t('import_error')+err.message);}
}

// ── MODALS ──
function closeModal(){setState({modal:null});}
function openRaceDetail(race){setState({modal:{type:'raceDetail',race}});}
function openRaceForm(race){setState({modal:{type:'raceForm',race}});}
function openDriverForm(driver){setState({modal:{type:'driverForm',driver}});}
function openCSVPreview(preview){setState({modal:{type:'csvPreview',preview}});}

function renderModal(){
  const {modal}=state;
  if(!modal) return null;
  switch(modal.type){
    case 'raceDetail':  return renderRaceDetailModal(modal.race);
    case 'raceForm':    return renderRaceFormModal(modal.race);
    case 'driverForm':  return renderDriverFormModal(modal.driver);
    case 'csvPreview':  return renderCSVPreviewModal(modal.preview);
    case 'jsonDuplicate': return renderJSONDuplicateModal(modal.preview,modal.allResults);
    case 'importCelebration': return renderImportCelebrationModal(modal.preview,modal.highlights);
    case 'batchSummary': return renderBatchSummaryModal(modal);
    case 'driverPicker': return renderDriverPickerModal(modal.drivers, modal.jsonText, modal.meta);
    case 'batchUpload': return renderBatchUploadModal();
    default: return null;
  }
}

function buildImportHighlights(preview){
  const existing=state.races;
  const delta=preview.iRatingAfter-preview.iRatingBefore;
  const catRaces=existing.filter(r=>r.category===preview.category);
  const trackRaces=existing.filter(r=>r.track===preview.track);
  const carRaces=existing.filter(r=>r.car===preview.car);
  const avgInc=existing.length>0?existing.reduce((s,r)=>s+r.inc,0)/existing.length:3;
  const recentCat=catRaces.slice(-20);
  const avgDelta=recentCat.length>=5?recentCat.reduce((s,r)=>s+iRDelta(r),0)/recentCat.length:null;
  const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
  const effectivePos=preview.classPos||preview.pos;
  let lossSeries=0,winSeries=0;
  for(let i=catRaces.length-1;i>=0;i--){
    const d=iRDelta(catRaces[i]);
    if(d<0){if(winSeries===0)lossSeries++;else break;}
    else{if(lossSeries===0)winSeries++;else break;}
  }
  const lastTrackRace=trackRaces.length>0?trackRaces[trackRaces.length-1]:null;
  const trackDeltas=trackRaces.map(r=>iRDelta(r));
  const trackKarma=trackDeltas.length>=3?trackDeltas.reduce((s,v)=>s+v,0)/trackDeltas.length:null;
  const h=[];

  if(effectivePos===1){
    const pool=['WIN! '+preview.iRatingAfter+' iR.','P1. No contest.','Won. Just like that.','First across the line — '+fmtD(delta)+' iR.'];
    if(lossSeries>=3) pool.push('After '+lossSeries+' losses: WIN. Long overdue.');
    h.push({icon:'🏆',text:pick(pool),color:'#ffd700'});
  } else if(delta>=200){
    h.push({icon:'💰',text:pick([fmtD(delta)+' iR — massive haul.',fmtD(delta)+' iR. That\'s how it\'s done.',fmtD(delta)+' iR in one shot.']),color:'#3fb950'});
  } else if(delta>=80){
    h.push({icon:'📈',text:pick([fmtD(delta)+' iR — solid.',fmtD(delta)+' iR. Consistent.',fmtD(delta)+' iR — curve going up.']),color:'#3fb950'});
  } else if(delta>0){
    h.push({icon:'✅',text:pick([fmtD(delta)+' iR — at least it\'s green.',fmtD(delta)+' iR. Take it.',fmtD(delta)+' iR — not spectacular but positive.']),color:'#3fb950'});
  } else if(delta===0){
    h.push({icon:'😐',text:pick(['±0 iR — as if you weren\'t there.','Exactly zero. Coffee break would have been just as effective.','±0 iR. The universe is indifferent.']),color:'#8b949e'});
  } else if(delta>=-50){
    h.push({icon:'😤',text:pick([delta+' iR — close but not enough.',delta+' iR lost. Marginal, but still red.',delta+' iR. Move on.']),color:'#e3b341'});
  } else {
    const pool=[delta+' iR — that hurt.',delta+' iR gone. Ouch.',delta+' iR. Tough one.'];
    if(lossSeries>=3) pool.push(delta+' iR — '+lossSeries+' losses in a row. Maybe take a break?');
    h.push({icon:'📉',text:pick(pool),color:'#f85149'});
  }

  if(avgDelta!==null){
    const avgStr=fmtD(Math.round(avgDelta));
    if(delta>avgDelta+60) h.push({icon:'🔥',text:pick(['Above your recent average (avg '+avgStr+' iR). Form is up.','Clearly above your avg — '+avgStr+' iR typical.']),color:'#3fb950'});
    else if(delta<avgDelta-60) h.push({icon:'❄️',text:pick(['Below your current avg (avg '+avgStr+' iR). Form dip?','Worse than your avg — normally '+avgStr+' iR.']),color:'#e3b341'});
  }

  for(const m of [1000,1500,2000,2500,3000,3500,4000]){
    if(preview.iRatingBefore<m&&preview.iRatingAfter>=m){
      const everReached=existing.some(r=>r.iRatingAfter>=m);
      h.push({icon:'🎉',text:everReached?'Back above '+m+' iR — welcome back.':m+' iR milestone reached!',color:'#ffd700'});
      break;
    }
  }

  if(preview.inc===0){
    const streak=(()=>{let s=0;for(let i=existing.length-1;i>=0;i--){if(existing[i].inc===0)s++;else break;}return s;})();
    h.push({icon:streak>=4?'🧼':'✓',text:streak>=4?`${streak+1} clean races in a row.`:pick(['Clean. No stress.','0x incidents. That\'s the way.','No damage, no drama.']),color:streak>=4?'#58a6ff':'#3fb950'});
  } else if(preview.inc>=6){
    h.push({icon:'⚠️',text:preview.externalInc?preview.inc+'x incidents — not your fault.':preview.inc+'x incidents. Rough one.',color:preview.inc>=10?'#f85149':'#e3b341'});
  }

  if(trackRaces.length===0){
    h.push({icon:'🗺️',text:pick(['First race at '+preview.track+'.','New track: '+preview.track+'.','Debut at '+preview.track+'.']),color:'#a371f7'});
  } else {
    const bestPos=Math.min(...trackRaces.map(r=>r.classPos||r.pos));
    if(effectivePos<bestPos) h.push({icon:'🎯',text:'New best result here: P'+effectivePos+' (was P'+bestPos+').',color:'#ffd700'});
  }

  return h.slice(0,4);
}

// ── Batch processor with progress ──
function processBatchFiles(files, statusArea, progressWrap){
  const dropZone=document.getElementById('batch-dropzone');
  if(dropZone) dropZone.style.display='none';
  progressWrap.style.display='flex';
  statusArea.style.display='flex';

  const bar=document.getElementById('batch-bar');
  const label=document.getElementById('batch-label');

  let newRaces=0, srPatched=0, seasonPatched=0, skipped=0;
  const errors=[];
  let done=0;
  const total=files.length;

  // Work on a copy of races to avoid re-rendering on every file
  let workingRaces=[...state.races];

  function addStatus(icon, text, color){
    const row=document.createElement('div');
    row.style.cssText='display:flex;gap:8px;align-items:flex-start;padding:6px 10px;background:#0d1117;border-radius:8px;font-size:12px;border:1px solid #21262d;';
    row.innerHTML=`<span style="flex-shrink:0;font-size:14px">${icon}</span><span style="color:${color||'#8b949e'};line-height:1.4">${text}</span>`;
    statusArea.appendChild(row);
    statusArea.scrollTop=statusArea.scrollHeight;
  }

  function updateProgress(){
    const pct=Math.round((done/total)*100);
    if(bar) bar.style.width=pct+'%';
    if(label) label.textContent=done+'/'+total+' — '+pct+'%';
  }

  function finish(){
    // Commit all changes at once
    state.races=workingRaces;
    saveLS(DB_KEY,workingRaces);

    if(bar) bar.style.background='linear-gradient(90deg,#3fb950,#58a6ff)';
    addStatus('🏁',
      t('batch_done')+newRaces+' '+t('batch_new')+', '+
      skipped+' '+t('batch_skipped')+', '+
      errors.length+' '+t('batch_errors'),
      '#3fb950'
    );
    const btnRow=document.createElement('div');
    btnRow.style.cssText='display:flex;gap:8px;margin-top:8px;';
    const doneBtn=document.createElement('button');
    doneBtn.className='btn';
    doneBtn.style.cssText='background:#238636;border-radius:8px;flex:1;border:none;color:#fff;padding:10px;cursor:pointer;font-weight:700;font-size:13px;';
    doneBtn.textContent='✅ '+t('batch_btn_done');
    doneBtn.onclick=()=>{closeModal();setState({tab:'races'});};
    btnRow.appendChild(doneBtn);
    statusArea.appendChild(btnRow);
  }

  function processFile(idx){
    if(idx>=total){finish();return;}
    const file=files[idx];
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const jsonText=ev.target.result;
        const {preview,allResults,track,category,sof}=parseOneJSON(jsonText);
        const existing=workingRaces.find(r=>r.id===preview.id);
        if(existing){
          let patch={};
          if(existing.srAfter===null&&preview.srAfter!==null) patch={...patch,srBefore:preview.srBefore,srAfter:preview.srAfter};
          if(existing.seasonYear==null&&preview.seasonYear!=null) patch={...patch,seasonYear:preview.seasonYear,seasonQuarter:preview.seasonQuarter,raceWeek:preview.raceWeek};
          if(Object.keys(patch).length>0){
            workingRaces=workingRaces.map(r=>r.id===preview.id?{...r,...patch}:r);
            if(patch.srAfter) srPatched++;
            if(patch.seasonYear) seasonPatched++;
            const parts=[];
            if(patch.srAfter) parts.push('SR patched');
            if(patch.seasonYear) parts.push('Season patched');
            addStatus('🔄', file.name+' — '+parts.join(', '), '#58a6ff');
          } else {
            skipped++;
            addStatus('⏭️', file.name+' — '+t('batch_already'), '#8b949e');
          }
          mergeOpponentsFromJSON(preview.id,preview.date,track,category,sof,allResults);
        } else {
          mergeOpponentsFromJSON(preview.id,preview.date,track,category,sof,allResults);
          // Add to working copy without triggering render
          workingRaces=[...workingRaces, preview];
          newRaces++;
          const delta=(preview.iRatingAfter||0)-(preview.iRatingBefore||0);
          const deltaStr=delta>=0?'+'+delta:String(delta);
          addStatus('✅', file.name+' — P'+(preview.classPos||preview.pos)+' '+preview.track+' ('+deltaStr+' iR)', '#3fb950');
        }
      }catch(err){
        errors.push(file.name+': '+err.message);
        addStatus('❌', file.name+' — '+err.message, '#f85149');
      }
      done++;
      updateProgress();
      setTimeout(()=>processFile(idx+1), 80);
    };
    reader.onerror=()=>{
      errors.push(file.name+': read error');
      addStatus('❌', file.name+' — '+t('batch_read_err'), '#f85149');
      done++;
      updateProgress();
      setTimeout(()=>processFile(idx+1), 80);
    };
    reader.readAsText(file);
  }

  addStatus('🚀', t('batch_start')+total+' '+t('batch_files'), '#8957e5');
  updateProgress();
  processFile(0);
}

// ── ZEITANALYSE TAB ──
function renderZeitanalyse(){
  const races = state.races;
  if(!races||races.length===0) return div({class:'card',style:{textAlign:'center',color:'#8b949e',padding:'40px'}},t('no_races_zeit'));

  function isWeekend(dateStr){
    const d=new Date(dateStr);
    const day=d.getDay(); // 0=So, 6=Sa
    return day===0||day===6;
  }

  function stats(arr){
    if(!arr||arr.length===0) return {count:0,avgPos:null,avgInc:null,irGain:null,top5:0,cleanRate:0,cleanCount:0};
    const count=arr.length;
    const avgPos=(arr.reduce((s,r)=>s+r.pos,0)/count).toFixed(1);
    const avgInc=(arr.reduce((s,r)=>s+(r.inc||0),0)/count).toFixed(1);
    const irGain=arr.reduce((s,r)=>s+((r.iRatingAfter||0)-(r.iRatingBefore||0)),0);
    const top5=arr.filter(r=>r.pos<=5).length;
    const cleanCount=arr.filter(r=>r.inc===0).length;
    const cleanRate=Math.round(cleanCount/count*100);
    return {count,avgPos,avgInc,irGain,top5,cleanCount,cleanRate};
  }

  const wd=races.filter(r=>!isWeekend(r.date));
  const we=races.filter(r=>isWeekend(r.date));
  const wdS=stats(wd);
  const weS=stats(we);

  // Color helpers
  function posColor(v,other){
    if(!v||!other) return '#c9d1d9';
    return parseFloat(v)<parseFloat(other)?'#3fb950':'#f85149';
  }
  function incColor(v,other){
    if(!v||!other) return '#c9d1d9';
    return parseFloat(v)<parseFloat(other)?'#3fb950':'#f85149';
  }
  function irColor(v){
    return v>=0?'#3fb950':'#f85149';
  }

  // Verdict
  let verdictText='';
  let verdictColor='#c9d1d9';
  if(wdS.count>0&&weS.count>0){
    const pdiff=parseFloat(weS.avgPos)-parseFloat(wdS.avgPos);
    const idiff=parseFloat(weS.avgInc)-parseFloat(wdS.avgInc);
    if(pdiff>1.5&&idiff>0.5){
      verdictText=t('verdict_alcohol');
      verdictColor='#f85149';
    } else if(pdiff<-1.5&&idiff<-0.5){
      verdictText=t('verdict_work');
      verdictColor='#f85149';
    } else if(Math.abs(pdiff)<0.5&&Math.abs(idiff)<0.3){
      verdictText=t('verdict_tie');
      verdictColor='#e3b341';
    } else if(pdiff>0){
      verdictText=t('verdict_we_worse');
      verdictColor='#e3b341';
    } else {
      verdictText=t('verdict_we_better');
      verdictColor='#3fb950';
    }
  }

  // Bar chart helper — CSS divs (avoids SVG namespace issues)
  function barChart(wdVal, weVal, label, format, lowerBetter){
    const v0=parseFloat(wdVal||0), v1=parseFloat(weVal||0);
    const maxV=Math.max(v0,v1,0.1);
    const colors = lowerBetter
      ? [v0<=v1?'#3fb950':'#f85149', v1<=v0?'#3fb950':'#f85149']
      : [v0>=v1?'#3fb950':'#f85149', v1>=v0?'#3fb950':'#f85149'];
    const bar=(val,col)=>div({style:{flex:'1',display:'flex',flexDirection:'column',alignItems:'center',gap:'4px',marginTop:'8px'}},
      div({style:{width:'100%',height:'40px',display:'flex',alignItems:'flex-end',justifyContent:'center'}},
        div({style:{width:'60%',height:Math.max(3,val/maxV*36)+'px',background:col+'44',borderRadius:'3px 3px 0 0',borderTop:'3px solid '+col}})
      )
    );
    return div({style:{display:'flex',gap:'8px'}}, bar(v0,colors[0]), bar(v1,colors[1]));
  }

  // iR bars with negative support
  function irBarChart(wdVal, weVal){
    const v0=wdVal||0, v1=weVal||0;
    const absMax=Math.max(Math.abs(v0),Math.abs(v1),1);
    const colors=[v0>=0?'#3fb950':'#f85149',v1>=0?'#3fb950':'#f85149'];
    const bar=(val,col)=>{
      const pct=Math.abs(val)/absMax*36;
      return div({style:{flex:'1',display:'flex',flexDirection:'column',alignItems:'center',marginTop:'8px'}},
        div({style:{width:'100%',height:'40px',display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}},
          div({style:{position:'absolute',top:'50%',left:'0',right:'0',height:'1px',background:'#30363d'}}),
          val>=0
            ? div({style:{width:'60%',height:Math.max(2,pct)+'px',background:col+'44',borderRadius:'3px 3px 0 0',borderTop:'2px solid '+col,marginTop:'auto',position:'absolute',bottom:'50%'}})
            : div({style:{width:'60%',height:Math.max(2,pct)+'px',background:col+'44',borderRadius:'0 0 3px 3px',borderBottom:'2px solid '+col,position:'absolute',top:'50%'}})
        )
      );
    };
    return div({style:{display:'flex',gap:'8px'}}, bar(v0,colors[0]), bar(v1,colors[1]));
  }

  // Wochentag breakdown (Mo-So)
  const dayNames = state.lang === 'es' ? ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'] : ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dayData=Array.from({length:7},(_,i)=>{
    const dr=races.filter(r=>new Date(r.date).getDay()===i);
    return {day:dayNames[i],s:stats(dr),isWE:i===0||i===6};
  });

  // Hour distribution
  function getHour(dateStr){
    if(!dateStr.includes('T')) return null;
    const t=dateStr.split('T')[1];
    if(!t) return null;
    return parseInt(t.split(':')[0]);
  }
  const hourBuckets={};
  races.forEach(r=>{
    const h=getHour(r.date);
    if(h===null) return;
    if(!hourBuckets[h]) hourBuckets[h]={count:0,posSum:0,incSum:0,irSum:0};
    hourBuckets[h].count++;
    hourBuckets[h].posSum+=r.pos;
    hourBuckets[h].incSum+=(r.inc||0);
    hourBuckets[h].irSum+=((r.iRatingAfter||0)-(r.iRatingBefore||0));
  });
  const hours=Object.keys(hourBuckets).map(Number).sort((a,b)=>a-b);

  function kpiCard(label, wdVal, weVal, unit, lowerBetter){
    const wdBetter=lowerBetter?(parseFloat(wdVal||999)<parseFloat(weVal||999)):(parseFloat(wdVal||0)>parseFloat(weVal||0));
    const weBetter=!wdBetter && (lowerBetter?(parseFloat(weVal||999)<parseFloat(wdVal||999)):(parseFloat(weVal||0)>parseFloat(wdVal||0)));
    return div({class:'card',style:{flex:'1',minWidth:'240px'}},
      div({style:{fontSize:'11px',color:'#8b949e',fontWeight:'700',letterSpacing:'1px',marginBottom:'12px',textTransform:'uppercase'}},label),
      div({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginBottom:'12px'}},
        div({},
          div({style:{fontSize:'11px',color:'#8b949e',marginBottom:'4px'}},t('weekday_lbl')+' '+wdS.count+'x'+(wdBetter?' 🏆':'')),
          div({class:'mono',style:{fontSize:'28px',color:wdBetter?'#3fb950':weBetter?'#f85149':'#c9d1d9',lineHeight:'1.1'}},(wdVal||'–')+(unit?unit:''))
        ),
        div({},
          div({style:{fontSize:'11px',color:'#8b949e',marginBottom:'4px'}},t('weekend_lbl')+' '+weS.count+'x'+(weBetter?' 🏆':'')),

    ) : null
